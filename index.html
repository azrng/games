<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏平台</title>
    <link rel="icon" href="img/game.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

    <div class="hub">
        <header class="hub-header">
            <div class="hub-brand">
                <img class="hub-brand-icon" src="img/game.svg" alt="游戏平台图标">
                <div>
                    <p class="hub-brand-eyebrow">Game Hub</p>
                    <h1 class="hub-brand-title">游戏平台</h1>
                </div>
            </div>
            <p class="hub-subtitle">选择一款游戏开始游玩</p>
        </header>

        <div class="hub-grid" id="game-grid" role="list" aria-label="游戏列表"></div>
    </div>

    <script src="data/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
