<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏平台</title>
    <link rel="icon" href="img/game.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="切换游戏列表">
        ☰
    </button>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="brand">
                    <img class="brand-icon" src="img/game.svg" alt="游戏平台图标">
                    <div>
                        <p class="brand-eyebrow">Game Hub</p>
                        <h1 class="brand-title">游戏平台</h1>
                    </div>
                </div>
                <button class="sidebar-close" id="sidebar-close" type="button" aria-label="关闭菜单">
                    ×
                </button>
            </header>

            <section class="sidebar-section">
                <div class="sidebar-copy">
                    <p class="sidebar-heading">游戏目录</p>
                    <p class="sidebar-text">菜单内容来自统一清单文件，新增游戏时只需要补一条元数据。</p>
                </div>
                <nav class="game-list" id="game-list" aria-label="游戏导航"></nav>
            </section>

        </aside>

        <main class="content">
            <header class="content-header">
                <div>
                    <p class="content-eyebrow">当前游戏</p>
                    <h2 class="content-title" id="current-game-title">加载中...</h2>
                    <p class="content-description" id="current-game-desc">正在读取游戏清单。</p>
                </div>
                <div class="content-badges">
                    <span class="badge" id="game-count-badge">0 款游戏</span>
                    <span class="badge badge-muted">统一清单驱动</span>
                </div>
            </header>

            <section class="frame-panel">
                <iframe id="game-frame" title="当前游戏" loading="lazy"></iframe>
            </section>
        </main>
    </div>

    <div class="overlay" id="overlay" hidden></div>

    <script src="js/store.js"></script>
    <script src="data/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
