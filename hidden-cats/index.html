<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找猫咪 - 游戏平台</title>
    <link rel="stylesheet" href="../css/custom.css">
    <style>
        :root {
            --page-bg: #fafbfc;
            --panel: #ffffff;
            --panel-muted: #f3f7fb;
            --paper: #fffdf7;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --text: #111827;
            --muted: #5b6475;
            --primary: #1a90ff;
            --primary-hover: #0078e0;
            --primary-soft: #eef4ff;
            --success: #10b981;
            --success-soft: #e6fbee;
            --warning: #f59e0b;
            --warning-soft: #fef3c7;
            --error: #ef4444;
            --error-soft: #fee2e2;
            --shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.08);
            --r-xl: 16px;
            --r-lg: 12px;
            --r-md: 8px;
            --r-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                linear-gradient(180deg, #ffffff 0%, var(--page-bg) 42%, #eef4ff 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== 整体布局 ===== */
        .game-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        /* ===== 顶部状态栏 ===== */
        .game-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
            z-index: 10;
        }

        .game-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .game-level {
            font-size: 13px;
            color: var(--muted);
        }

        .game-level small {
            display: block;
            margin-top: 2px;
            color: var(--primary);
            font-weight: 600;
        }

        .game-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            color: var(--muted);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--text);
        }

        /* ===== 进度条 ===== */
        .progress-bar-container {
            flex-shrink: 0;
            padding: 10px 16px 8px;
            background: var(--panel);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .progress-label { color: var(--muted); }
        .progress-count { font-weight: 600; color: var(--primary); }

        .progress-track {
            height: 8px;
            background: var(--panel-muted);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 999px;
            transition: width 300ms ease;
        }

        /* ===== 画布区域 ===== */
        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(26, 144, 255, 0.08), rgba(16, 185, 129, 0.08)),
                repeating-linear-gradient(0deg, rgba(17, 24, 39, 0.035) 0 1px, transparent 1px 26px),
                repeating-linear-gradient(90deg, rgba(17, 24, 39, 0.03) 0 1px, transparent 1px 26px),
                var(--panel-muted);
        }

        .canvas-wrap canvas {
            position: absolute;
            top: 0; left: 0;
            image-rendering: auto;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: var(--shadow);
        }

        /* ===== 底部操作栏 ===== */
        .game-footer {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--panel);
            border-top: 1px solid var(--border);
            box-shadow: 0 -8px 20px rgba(15, 23, 42, 0.08);
        }

        .btn {
            flex: 1;
            min-height: 44px;
            padding: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 150ms, border-color 150ms, transform 150ms;
            text-align: center;
        }

        .btn:active {
            background: var(--panel-muted);
            transform: translateY(1px);
        }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-primary:active { background: var(--primary-hover); }
        .btn-hint {
            position: relative;
        }
        .hint-badge {
            position: absolute;
            top: -6px; right: -4px;
            min-width: 18px; height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: var(--warning);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            line-height: 18px;
            text-align: center;
        }

        /* ===== 弹层 ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 200ms, visibility 200ms;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: min(340px, 90vw);
            background: var(--panel);
            border-radius: var(--r-xl);
            padding: 28px 24px 24px;
            box-shadow: var(--shadow);
            text-align: center;
            transform: translateY(20px);
            transition: transform 250ms ease;
        }

        .overlay.show .modal { transform: translateY(0); }

        .modal-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .modal-stat {
            padding: 10px 12px;
            background: var(--panel-muted);
            border-radius: var(--r-sm);
        }

        .modal-stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .modal-stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-stat-value.primary { color: var(--primary); }
        .modal-stat-value.success { color: var(--success); }

        .modal-stars {
            margin: -4px 0 16px;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--warning);
        }

        .modal-rating {
            margin: -8px 0 16px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .modal-best {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .modal-best span { color: var(--text); font-weight: 600; }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions .btn { flex: 1; padding: 12px 0; }

        /* ===== 命中动画 ===== */
        .hit-marker {
            position: absolute;
            pointer-events: none;
            border: 3px solid var(--success);
            border-radius: 50%;
            animation: hitPop 500ms ease forwards;
            box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.16);
        }

        @keyframes hitPop {
            0% { transform: scale(0.5); opacity: 1; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .hit-particle {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.16);
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: hitParticle 620ms ease-out forwards;
            z-index: 18;
        }

        @keyframes hitParticle {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.72); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.35); }
        }

        .combo-toast {
            position: absolute;
            left: 50%;
            top: 18px;
            min-width: 88px;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--warning);
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            pointer-events: none;
            transform: translateX(-50%) translateY(-8px) scale(0.92);
            opacity: 0;
            transition: opacity 160ms ease, transform 180ms ease;
            box-shadow: 0 10px 22px rgba(245, 158, 11, 0.24);
            z-index: 22;
        }

        .combo-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .miss-marker {
            position: absolute;
            pointer-events: none;
            width: 20px; height: 20px;
            animation: missFade 600ms ease forwards;
        }

        .miss-marker::before, .miss-marker::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 16px; height: 2px;
            background: var(--error);
            border-radius: 1px;
        }

        .miss-marker::before { transform: translate(-50%, -50%) rotate(45deg); }
        .miss-marker::after { transform: translate(-50%, -50%) rotate(-45deg); }

        @keyframes missFade {
            0% { opacity: 1; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1); }
        }

        .hint-marker {
            position: absolute;
            border: 3px solid rgba(47,158,68,0.85);
            border-radius: 999px;
            pointer-events: none;
            transform: scale(0.72);
            animation: hintPulse 1200ms ease-out forwards;
            box-shadow: 0 0 0 0 rgba(47,158,68,0.22);
            z-index: 15;
        }

        @keyframes hintPulse {
            0% { opacity: 0; transform: scale(0.6); box-shadow: 0 0 0 0 rgba(47,158,68,0.24); }
            20% { opacity: 1; transform: scale(1); }
            62% { opacity: 0.9; transform: scale(1.16); box-shadow: 0 0 0 18px rgba(47,158,68,0); }
            100% { opacity: 0; transform: scale(1.34); box-shadow: 0 0 0 26px rgba(47,158,68,0); }
        }

        .proximity-toast {
            position: absolute;
            left: 50%;
            bottom: 18px;
            max-width: min(320px, calc(100% - 32px));
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.86);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            transform: translateX(-50%) translateY(8px);
            opacity: 0;
            transition: opacity 160ms ease, transform 160ms ease;
            z-index: 20;
        }

        .share-toast {
            position: fixed;
            left: 50%;
            bottom: max(82px, env(safe-area-inset-bottom));
            max-width: min(340px, calc(100% - 32px));
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transition: opacity 160ms ease, transform 160ms ease;
            z-index: 130;
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .proximity-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .win-confetti {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 7px;
            height: 12px;
            border-radius: 2px;
            background: var(--primary);
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: winConfetti 780ms ease-out forwards;
            z-index: 115;
        }

        @keyframes winConfetti {
            0% { opacity: 1; transform: translate(-50%, -50%) rotate(0deg); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(360deg); }
        }

        .intro-panel,
        .level-panel {
            text-align: left;
        }

        .intro-panel .modal-title,
        .level-panel .modal-title {
            text-align: center;
        }

        .intro-list {
            display: grid;
            gap: 10px;
            margin: 0 0 18px;
            padding: 0;
            list-style: none;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .intro-list strong {
            color: var(--text);
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 260px;
            overflow: auto;
            margin-bottom: 8px;
            padding-right: 2px;
        }

        .level-scroll-hint {
            display: none;
            margin: 0 0 14px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .level-panel.has-scroll .level-scroll-hint {
            display: block;
        }

        .level-choice {
            min-height: 54px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--panel-muted);
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
        }

        .level-choice small {
            display: block;
            margin-top: 3px;
            color: var(--warning);
            font-size: 11px;
            letter-spacing: 0;
        }

        .level-choice.locked {
            opacity: 0.42;
            cursor: not-allowed;
        }

        @media (prefers-reduced-motion: reduce) {
            .hit-marker,
            .miss-marker,
            .hint-marker,
            .hit-particle,
            .win-confetti {
                animation-duration: 1ms;
            }
        }

        @media (max-width: 360px), (max-height: 680px) {
            .game-header {
                padding-top: 8px;
                padding-bottom: 8px;
            }

            .game-title {
                font-size: 16px;
            }

            .game-stats {
                gap: 10px;
                font-size: 12px;
            }

            .progress-bar-container {
                padding-top: 8px;
            }

            .game-footer {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-shell">
        <header class="game-header">
            <div>
                <div class="game-title">找猫咪</div>
                <div class="game-level" id="levelLabel">第 1 关</div>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span>点击</span>
                    <span class="stat-value" id="stepCount">0</span>
                </div>
                <div class="stat-item">
                    <span>时间</span>
                    <span class="stat-value" id="timerDisplay">00:00</span>
                </div>
            </div>
        </header>

        <div class="progress-bar-container">
            <div class="progress-info">
                <span class="progress-label">已找到猫咪</span>
                <span class="progress-count" id="progressCount">0 / 3</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="gameCanvas" role="img" aria-label="找猫咪游戏画布：在线稿场景中寻找隐藏猫咪，可拖拽平移、双指或滚轮缩放"></canvas>
            <div class="proximity-toast" id="proximityToast" aria-live="polite"></div>
            <div class="combo-toast" id="comboToast" aria-live="polite"></div>
        </div>
        <div class="share-toast" id="shareToast" aria-live="polite"></div>

        <footer class="game-footer">
            <button class="btn btn-hint" id="btnHint" type="button">
                提示
                <span class="hint-badge" id="hintBadge">2</span>
            </button>
            <button class="btn" id="btnResetView" type="button">重置缩放</button>
            <button class="btn" id="btnLevels" type="button">选关</button>
            <button class="btn" id="btnRestart" type="button">重新开始</button>
        </footer>
    </div>

    <!-- 通关弹层 -->
    <div class="overlay" id="winOverlay">
        <div class="modal">
            <div class="modal-icon">🎉</div>
            <div class="modal-title">通关成功</div>
            <div class="modal-stars" id="modalStars" aria-label="本关星级">☆☆☆</div>
            <div class="modal-rating" id="modalRating">继续挑战，争取更少点击和更快通关。</div>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="modal-stat-label">当前关卡</div>
                    <div class="modal-stat-value primary" id="modalLevel">1</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">找到猫咪</div>
                    <div class="modal-stat-value success" id="modalCats">3</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">点击次数</div>
                    <div class="modal-stat-value" id="modalSteps">0</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">用时</div>
                    <div class="modal-stat-value" id="modalTime">00:00</div>
                </div>
            </div>
            <div class="modal-best">
                <div>最高关卡: <span id="modalBestLevel">0</span></div>
                <div>本关最佳: <span id="modalLevelBest">--</span></div>
            </div>
            <div class="modal-actions">
                <button class="btn" id="btnShare" type="button">分享</button>
                <button class="btn" id="btnReplay" type="button">再来一次</button>
                <button class="btn btn-primary" id="btnNext" type="button">下一关</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="introOverlay">
        <div class="modal intro-panel">
            <div class="modal-icon">🐾</div>
            <div class="modal-title">找到藏在线稿里的猫</div>
            <ul class="intro-list">
                <li><strong>点击猫咪轮廓</strong>即可收集，找到全部猫咪通关。</li>
                <li><strong>拖拽平移</strong>画布，双指或鼠标滚轮可以缩放。</li>
                <li><strong>点错也有冷热反馈</strong>，靠近猫咪时会提示方向感。</li>
            </ul>
            <button class="btn btn-primary" id="btnIntroStart" type="button">开始寻找</button>
        </div>
    </div>

    <div class="overlay" id="levelOverlay">
        <div class="modal level-panel" id="levelPanel">
            <div class="modal-title">选择关卡</div>
            <div class="level-grid" id="levelGrid"></div>
            <div class="level-scroll-hint" id="levelScrollHint">向下滑动查看更多关卡</div>
            <button class="btn" id="btnCloseLevels" type="button">关闭</button>
        </div>
    </div>

    <script>
    (function () {
        "use strict";

        /* ===== 常量与配置 ===== */
        const STORAGE_PREFIX = "hidden-cats-";
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 3.0;
        const HIT_RADIUS_MULT = 1.3;
        const SKETCH_LINE = "#757b84";
        const SKETCH_LIGHT = "#a7adb5";
        const CAT_LINE = "#4f5662";

        const SCENE_TEMPLATES = ["travel", "harbor", "library", "garden", "kitchen", "museum"];
        const LEVEL_DIFFICULTY = [
            { from: 1, cats: 3, size: 1120, obstaclePerCat: 4, extraObstacles: 14, textureBoost: 0.82, decoyBase: 12, minCatSpacing: 0.13, candidateMultiplier: 5 },
            { from: 4, cats: 4, size: 1280, obstaclePerCat: 5, extraObstacles: 18, textureBoost: 0.96, decoyBase: 16, minCatSpacing: 0.12, candidateMultiplier: 5 },
            { from: 7, cats: 5, size: 1440, obstaclePerCat: 6, extraObstacles: 22, textureBoost: 1.08, decoyBase: 20, minCatSpacing: 0.11, candidateMultiplier: 6 },
            { from: 11, cats: 7, size: 1640, obstaclePerCat: 7, extraObstacles: 26, textureBoost: 1.2, decoyBase: 24, minCatSpacing: 0.1, candidateMultiplier: 6 },
            { from: 16, cats: 9, size: 1840, obstaclePerCat: 8, extraObstacles: 32, textureBoost: 1.34, decoyBase: 28, minCatSpacing: 0.09, candidateMultiplier: 7 },
        ];

        function levelDifficulty(level) {
            let tier = LEVEL_DIFFICULTY[0];
            for (const item of LEVEL_DIFFICULTY) {
                if (level >= item.from) tier = item;
            }
            const nextTier = LEVEL_DIFFICULTY.find((item) => item.from > tier.from);
            const tierProgress = nextTier ? Math.min(level - tier.from, nextTier.from - tier.from - 1) : Math.min(level - tier.from, 8);
            return {
                ...tier,
                size: Math.min(tier.size + tierProgress * 52, 2200),
            };
        }

        function rawShuffledSceneTemplatesForCycle(cycle) {
            const shuffled = SCENE_TEMPLATES.slice();
            const random = seededRandom(deriveSeed((cycle + 1) * 2654435761, 71));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function shuffledSceneTemplatesForCycle(cycle) {
            const shuffled = rawShuffledSceneTemplatesForCycle(cycle);
            if (cycle > 0) {
                const previous = shuffledSceneTemplatesForCycle(cycle - 1);
                for (let i = 0; i < shuffled.length; i++) {
                    if (shuffled[i] !== previous[i]) continue;
                    const swapIndex = shuffled.findIndex((item, candidateIndex) => (
                        candidateIndex !== i &&
                        item !== previous[i] &&
                        shuffled[i] !== previous[candidateIndex]
                    ));
                    if (swapIndex >= 0) {
                        [shuffled[i], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[i]];
                    }
                }
            }
            return shuffled;
        }

        function sceneTemplateForLevel(level) {
            const cycle = Math.floor((level - 1) / SCENE_TEMPLATES.length);
            const index = (level - 1) % SCENE_TEMPLATES.length;
            return shuffledSceneTemplatesForCycle(cycle)[index];
        }

        /* 每关猫咪数量由难度配置表控制 */
        function catCount(level) {
            return Math.min(levelDifficulty(level).cats, 10);

        function canvasSize(level) {
            return levelDifficulty(level).size;
        }

        /* 干扰物数量 */
        function obstacleCount(cats, level) {
            const difficulty = levelDifficulty(level);
            return cats * difficulty.obstaclePerCat + difficulty.extraObstacles;
        }

        function hintsForLevel(cats, level) {
            return Math.max(2, Math.min(5, Math.ceil(cats / 3) + (level >= 10 ? 1 : 0)));
        }

        /* ===== 游戏状态 ===== */
        let state = {};

        function initState(level, levelSeed) {
            const size = canvasSize(level);

            const stableSeed = normalizeSeed(levelSeed || createLevelSeed(level));
            state = {
                level,
                size,
                levelSeed: stableSeed,
                sceneTemplate: sceneTemplateForLevel(level),
                difficulty: levelDifficulty(level),
                sceneSeed: deriveSeed(stableSeed, 11),
                catSeed: deriveSeed(stableSeed, 23),
                obstacleSeed: deriveSeed(stableSeed, 37),
                hintSeed: deriveSeed(stableSeed, 53),

        /* ===== 绘制工具 ===== */

        /* 随机整数 [min, max] */
        function randInt(min, max, random = Math.random) { return Math.floor(random() * (max - min + 1)) + min; }
        function randFloat(min, max, random = Math.random) { return random() * (max - min) + min; }

        function normalizeSeed(seed) {
            let value = Math.floor(seed) % 2147483647;
            if (value <= 0) value += 2147483646;
            return value;
        }

        function createLevelSeed(level) {
            return normalizeSeed(Date.now() + level * 2654435761 + Math.floor(Math.random() * 1000000));
        }

        function deriveSeed(seed, salt) {
            return normalizeSeed(seed + salt * 1000003 + (seed % 9973) * (salt + 17));
        }

        function seededRandom(seed) {
            let value = seed % 2147483647;
            if (value <= 0) value += 2147483646;
            return () => {
                value = value * 16807 % 2147483647;
                return (value - 1) / 2147483646;
            };
        }

        function pickFrom(list, random) {
            return list[Math.floor(random() * list.length)];
        }

        function canvasDpr() {
            return Math.max(1, Math.min(window.devicePixelRatio || 1, 2.5));
        }

        function configureCanvasForDpr(targetCanvas, targetCtx, size, dpr = canvasDpr()) {
            targetCanvas.width = Math.round(size * dpr);
            targetCanvas.height = Math.round(size * dpr);
            if (targetCanvas.style) {
                targetCanvas.style.width = `${size}px`;
                targetCanvas.style.height = `${size}px`;
            }
            if (targetCtx.setTransform) {
                targetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            } else {
                targetCtx.scale(dpr, dpr);
            }
            return dpr;
        }

        /* 绘制隐藏在线稿中的小猫轮廓 */
        function drawCat(cx, cy, size, rotation, variant, found) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);

            const s = size;
            const fillColor = found ? "rgba(16,185,129,0.16)" : "rgba(251,251,248,0.02)";
            const lineColor = found ? "rgba(16,185,129,0.95)" : CAT_LINE;
            ctx.fillStyle = fillColor;
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = Math.max(1.1, s * 0.038);
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            const compact = variant % 4;
            const headY = compact === 1 ? -s * 0.02 : -s * 0.24;

            ctx.beginPath();
            if (compact === 0) {
                ctx.ellipse(0, s * 0.15, s * 0.34, s * 0.45, -0.05, 0, Math.PI * 2);
            } else if (compact === 1) {
                ctx.ellipse(-s * 0.02, s * 0.18, s * 0.52, s * 0.24, 0.04, 0, Math.PI * 2);
            } else if (compact === 2) {
                ctx.arc(0, s * 0.16, s * 0.33, 0, Math.PI * 2);
            } else {
                ctx.ellipse(-s * 0.04, s * 0.12, s * 0.48, s * 0.26, -0.18, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, headY, s * 0.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-s * 0.2, headY - s * 0.17);
            if (compact === 1) {
                ctx.quadraticCurveTo(-s * 0.36, headY - s * 0.34, -s * 0.28, headY - s * 0.48);
                ctx.lineTo(-s * 0.03, headY - s * 0.25);
            } else {
                ctx.lineTo(-s * 0.33, headY - s * 0.46);
                ctx.lineTo(-s * 0.03, headY - s * 0.25);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(s * 0.2, headY - s * 0.17);
            if (compact === 1) {
                ctx.quadraticCurveTo(s * 0.36, headY - s * 0.34, s * 0.28, headY - s * 0.48);
                ctx.lineTo(s * 0.03, headY - s * 0.25);
            } else {
                ctx.lineTo(s * 0.33, headY - s * 0.46);
                ctx.lineTo(s * 0.03, headY - s * 0.25);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = found ? "rgba(16,185,129,0.95)" : "#5f6671";
            ctx.beginPath();
            ctx.arc(-s * 0.09, headY - s * 0.02, s * 0.022, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s * 0.09, headY - s * 0.02, s * 0.022, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = lineColor;
            ctx.beginPath();
            const whiskerSpread = compact === 2 ? 0.2 : 0.12;
            ctx.moveTo(-s * 0.05, headY + s * 0.08);
            ctx.lineTo(-s * 0.27, headY + s * (0.02 - whiskerSpread * 0.12));
            ctx.moveTo(-s * 0.04, headY + s * 0.13);
            ctx.lineTo(-s * 0.28, headY + s * (0.14 + whiskerSpread * 0.12));
            if (compact !== 3) {
                ctx.moveTo(-s * 0.04, headY + s * 0.18);
                ctx.lineTo(-s * 0.24, headY + s * 0.24);
            }
            ctx.moveTo(s * 0.05, headY + s * 0.08);
            ctx.lineTo(s * 0.27, headY + s * (0.02 - whiskerSpread * 0.12));
            ctx.moveTo(s * 0.04, headY + s * 0.13);
            ctx.lineTo(s * 0.28, headY + s * (0.14 + whiskerSpread * 0.12));
            if (compact !== 3) {
                ctx.moveTo(s * 0.04, headY + s * 0.18);
                ctx.lineTo(s * 0.24, headY + s * 0.24);
            }
            ctx.stroke();

            ctx.beginPath();
            const tailDir = compact % 2 === 0 ? 1 : -1;
            if (compact === 2) {
                ctx.arc(tailDir * s * 0.45, -s * 0.04, s * 0.17, Math.PI * 0.2, Math.PI * 1.6, compact === 1);
            } else if (compact === 3) {
                ctx.moveTo(tailDir * s * 0.32, s * 0.1);
                ctx.quadraticCurveTo(tailDir * s * 0.58, s * 0.22, tailDir * s * 0.62, -s * 0.03);
                ctx.quadraticCurveTo(tailDir * s * 0.62, -s * 0.24, tailDir * s * 0.42, -s * 0.24);
            } else {
                ctx.moveTo(tailDir * s * 0.32, s * 0.12);
                ctx.quadraticCurveTo(
                    tailDir * s * 0.7, -s * 0.08,
                    tailDir * s * 0.46, -s * 0.38
                );
            }
            ctx.stroke();

            if (compact === 0 || compact === 3) {
                ctx.beginPath();
                ctx.moveTo(-s * 0.18, s * 0.5);
                ctx.lineTo(-s * 0.08, s * 0.32);
                ctx.moveTo(s * 0.18, s * 0.5);
                ctx.lineTo(s * 0.08, s * 0.32);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawColosseum(x, y, w, h, lean = 0) {
            ctx.save();

                    ctx.moveTo(x + w * 0.18, y + h * 0.2);
                    ctx.lineTo(x + w * 0.82, y + h * 0.8);
                    ctx.moveTo(x + w * 0.82, y + h * 0.2);
                    ctx.lineTo(x + w * 0.18, y + h * 0.8);

                ctx.stroke();

        function drawDenseLinework(size, random) {

            sketchStyle(1, "rgba(117,123,132,0.72)");
            const windowCount = Math.floor((75 + Math.floor(random() * 45)) * textureBoost);
            for (let i = 0; i < windowCount; i++) {
                const x = size * (0.03 + random() * 0.92);
                const y = size * (0.18 + random() * 0.68);
                const w = size * (0.012 + random() * 0.018);
                const h = size * (0.018 + random() * 0.026);
                if (random() < 0.55) {
                    ctx.strokeRect(x, y, w, h);
                    ctx.beginPath();
                    ctx.moveTo(x + w * 0.5, y);
                    ctx.lineTo(x + w * 0.5, y + h);
                    ctx.moveTo(x, y + h * 0.5);
                    ctx.lineTo(x + w, y + h * 0.5);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(x, y + h);
                    ctx.lineTo(x, y + h * 0.35);
                    ctx.quadraticCurveTo(x + w * 0.5, y - h * 0.15, x + w, y + h * 0.35);
                    ctx.lineTo(x + w, y + h);
                    ctx.stroke();

            const textureCount = Math.floor((95 + Math.floor(random() * 60)) * textureBoost);
            for (let i = 0; i < textureCount; i++) {
                const x = size * random();
                const y = size * random();
                const len = size * (0.015 + random() * 0.035);
                const angle = random() * Math.PI;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(
                    x + Math.cos(angle + 0.8) * len * 0.45,
                    y + Math.sin(angle + 0.8) * len * 0.45,
                    x + Math.cos(angle) * len,
                    y + Math.sin(angle) * len

                ctx.stroke();

            const decoyCount = difficulty.decoyBase + Math.floor(random() * 12);

        /* 绘制干扰物 */
        function drawObstacle(o) {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rotation);
            ctx.scale(o.scale, o.scale);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 1.2;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            const s = o.size;

            switch (o.type) {
                case "tree":
                    ctx.beginPath();
                    ctx.moveTo(0, s * 0.4);
                    ctx.lineTo(0, -s * 0.1);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.3, s * 0.1);
                    ctx.lineTo(0, -s * 0.35);
                    ctx.lineTo(s * 0.3, s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "house":
                    ctx.strokeRect(-s * 0.3, -s * 0.1, s * 0.6, s * 0.5);
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.35, -s * 0.1);
                    ctx.lineTo(0, -s * 0.4);
                    ctx.lineTo(s * 0.35, -s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "flower":
                    ctx.beginPath();
                    ctx.moveTo(0, s * 0.35);
                    ctx.lineTo(0, -s * 0.05);
                    ctx.stroke();
                    for (let i = 0; i < 5; i++) {
                        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
                        ctx.beginPath();
                        ctx.arc(Math.cos(a) * s * 0.12, -s * 0.15 + Math.sin(a) * s * 0.12, s * 0.07, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    break;
                case "bottle":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.1, -s * 0.35);
                    ctx.lineTo(-s * 0.1, -s * 0.2);
                    ctx.lineTo(-s * 0.2, -s * 0.15);
                    ctx.lineTo(-s * 0.2, s * 0.3);
                    ctx.lineTo(s * 0.2, s * 0.3);
                    ctx.lineTo(s * 0.2, -s * 0.15);
                    ctx.lineTo(s * 0.1, -s * 0.2);
                    ctx.lineTo(s * 0.1, -s * 0.35);
                    ctx.stroke();
                    break;
                case "book":
                    ctx.strokeRect(-s * 0.25, -s * 0.2, s * 0.5, s * 0.4);
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.05, -s * 0.2);
                    ctx.lineTo(-s * 0.05, s * 0.2);
                    ctx.stroke();
                    break;
                case "star":
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const outerA = (i * 72 - 90) * Math.PI / 180;
                        const innerA = ((i * 72 + 36) - 90) * Math.PI / 180;
                        const ox = Math.cos(outerA) * s * 0.25;
                        const oy = Math.sin(outerA) * s * 0.25;
                        const ix = Math.cos(innerA) * s * 0.1;
                        const iy = Math.sin(innerA) * s * 0.1;
                        if (i === 0) ctx.moveTo(ox, oy);
                        else ctx.lineTo(ox, oy);
                        ctx.lineTo(ix, iy);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "cloud":
                    ctx.beginPath();
                    ctx.arc(-s * 0.15, 0, s * 0.15, 0, Math.PI * 2);
                    ctx.arc(s * 0.05, -s * 0.08, s * 0.18, 0, Math.PI * 2);
                    ctx.arc(s * 0.2, 0, s * 0.13, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case "fish":
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s * 0.25, s * 0.12, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(s * 0.2, 0);
                    ctx.lineTo(s * 0.38, -s * 0.1);
                    ctx.lineTo(s * 0.38, s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(-s * 0.1, -s * 0.02, s * 0.02, 0, Math.PI * 2);
                    ctx.fillStyle = "#555";
                    ctx.fill();
                    break;
                case "mushroom":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.05, s * 0.25);
                    ctx.lineTo(-s * 0.05, 0);
                    ctx.lineTo(s * 0.05, 0);
                    ctx.lineTo(s * 0.05, s * 0.25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(0, -s * 0.05, s * 0.2, s * 0.15, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case "window":
                    ctx.strokeRect(-s * 0.22, -s * 0.3, s * 0.44, s * 0.6);
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.3);
                    ctx.lineTo(0, s * 0.3);
                    ctx.moveTo(-s * 0.22, 0);
                    ctx.lineTo(s * 0.22, 0);
                    ctx.stroke();
                    break;
                case "plate":
                    strokeEllipse(0, 0, s * 0.34, s * 0.2, 0.08);
                    strokeEllipse(0, 0, s * 0.2, s * 0.1, 0.08);
                    break;
                case "leaf":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.28, s * 0.18);
                    ctx.quadraticCurveTo(0, -s * 0.36, s * 0.3, s * 0.16);
                    ctx.quadraticCurveTo(0, s * 0.28, -s * 0.28, s * 0.18);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.16, s * 0.16);
                    ctx.lineTo(s * 0.2, -s * 0.08);
                    ctx.stroke();
                    break;
            }
            ctx.restore();
        }

        function candidateCatsFromRegions(size, random, count) {
            const regions = semanticCatRegions(size);

            const targetCount = Math.max(count * difficulty.candidateMultiplier, 24);
            const candidates = [];
            for (let i = 0; i < targetCount; i++) {
                const region = pickFrom(regions, random);
                const r = size * (region.r + (random() - 0.5) * 0.004);
                candidates.push({
                    x: size * (region.xMin + random() * (region.xMax - region.xMin)),
                    y: size * (region.yMin + random() * (region.yMax - region.yMin)),
                    r,
                    variant: pickFrom(region.variants, random),
                    rotation: region.rot[0] + random() * (region.rot[1] - region.rot[0]),
                    region: region.name,
                });
            }
            return candidates;
        }

            const result = items.slice();
            for (let i = result.length - 1; i > 0; i--) {

                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

            const difficulty = state.difficulty || levelDifficulty(state.level || 1);
            const minDist = size * difficulty.minCatSpacing;
            const padding = size * 0.045;

            for (const candidate of candidates) {
                if (candidate.x < padding || candidate.x > size - padding || candidate.y < padding || candidate.y > size - padding) continue;
                if (selected.some((item) => Math.hypot(item.x - candidate.x, item.y - candidate.y) < minDist)) continue;
                selected.push(candidate);
                if (selected.length >= cats) break;
            }

            if (selected.length < cats) {
                for (const candidate of candidates) {
                    if (selected.includes(candidate)) continue;
                    selected.push(candidate);
                    if (selected.length >= cats) break;
                }
            }

            return selected;

                    size: randInt(35, 65, obstacleRandom),
                    scale: randFloat(0.7, 1.3, obstacleRandom),
                    rotation: randFloat(-0.6, 0.6, obstacleRandom),

        /* ===== 渲染 ===== */
        function buildBackgroundCache() {
            if (typeof document.createElement !== "function") {
                state.backgroundCanvas = null;
                return;
            }

            const size = state.size;
            const activeCanvas = canvas;
            const activeCtx = ctx;
            const cache = document.createElement("canvas");
            const cacheCtx = cache.getContext && cache.getContext("2d");
            if (!cacheCtx) {
                state.backgroundCanvas = null;
                return;
            }

            configureCanvasForDpr(cache, cacheCtx, size, state.dpr);
            canvas = cache;
            ctx = cacheCtx;
            try {
                drawTravelSketchScene(size);
                state.obstacles.forEach(drawObstacle);
            } finally {
                canvas = activeCanvas;
                ctx = activeCtx;
            }
            state.backgroundCanvas = cache;
        }

        function renderScene() {
            const size = state.size;
            ctx.clearRect(0, 0, size, size);

            if (state.backgroundCanvas) {
                ctx.drawImage(state.backgroundCanvas, 0, 0, size, size);
            } else {
                drawTravelSketchScene(size);
                state.obstacles.forEach(drawObstacle);
            }

            state.cats.forEach(c => {
                drawCat(c.x, c.y, c.r, c.rotation, c.variant, c.found);

            state.scale = fitScale * 0.9;
            state.offsetX = (vw - size * state.scale) / 2;
            state.offsetY = (vh - size * state.scale) / 2;
            applyTransform();
        }

        function applyTransform() {
            clampView();
            canvas.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
            canvas.style.transformOrigin = "0 0";
        }

        function animateViewTo(targetScale, targetOffsetX, targetOffsetY, duration = 520, onComplete) {
            const startScale = state.scale;
            const startOffsetX = state.offsetX;
            const startOffsetY = state.offsetY;
            const startAt = performance.now();
            const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

            function step(now) {
                const pct = Math.min(1, (now - startAt) / duration);
                const eased = easeOutCubic(pct);
                state.scale = startScale + (targetScale - startScale) * eased;
                state.offsetX = startOffsetX + (targetOffsetX - startOffsetX) * eased;
                state.offsetY = startOffsetY + (targetOffsetY - startOffsetY) * eased;
                applyTransform();

                if (pct < 1) {
                    requestAnimationFrame(step);
                } else if (onComplete) {
                    onComplete();
                }
            }

            requestAnimationFrame(step);
        }

        function clampView() {
            const vw = wrap.clientWidth;
            const vh = wrap.clientHeight;
            const scaled = state.size * state.scale;
            const margin = 16;

            if (scaled <= vw) {
                state.offsetX = (vw - scaled) / 2;
            } else {
                const minX = vw - scaled - margin;
                const maxX = margin;
                state.offsetX = Math.min(maxX, Math.max(minX, state.offsetX));
            }

            if (scaled <= vh) {
                state.offsetY = (vh - scaled) / 2;
            } else {
                const minY = vh - scaled - margin;
                const maxY = margin;
                state.offsetY = Math.min(maxY, Math.max(minY, state.offsetY));
            }
        }

        /* ===== 触控交互 ===== */
        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let panStartX = 0, panStartY = 0;
        let panStartOffX = 0, panStartOffY = 0;
        let touchStartTime = 0;
        let touchMoved = false;
        let lastTouchTapAt = 0;

        function getTouchDist(t1, t2) {
            return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }

        wrap.addEventListener("touchstart", (e) => {
            if (state.won) return;
            e.preventDefault();

            if (e.touches.length === 1) {
                touchStartTime = Date.now();
                touchMoved = false;
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
                panStartOffX = state.offsetX;
                panStartOffY = state.offsetY;
            } else if (e.touches.length === 2) {
                pinchStartDist = getTouchDist(e.touches[0], e.touches[1]);
                pinchStartScale = state.scale;
            }
        }, { passive: false });

        wrap.addEventListener("touchmove", (e) => {
            if (state.won) return;
            e.preventDefault();

            if (e.touches.length === 1) {
                const dx = e.touches[0].clientX - panStartX;
                const dy = e.touches[0].clientY - panStartY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchMoved = true;
                state.offsetX = panStartOffX + dx;
                state.offsetY = panStartOffY + dy;
                applyTransform();
            } else if (e.touches.length === 2) {
                touchMoved = true;
                const dist = getTouchDist(e.touches[0], e.touches[1]);
                const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
                const rect = wrap.getBoundingClientRect();
                const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const ratio = newScale / state.scale;
                state.offsetX = cx - ratio * (cx - state.offsetX);
                state.offsetY = cy - ratio * (cy - state.offsetY);
                state.scale = newScale;
                applyTransform();
            }
        }, { passive: false });

        wrap.addEventListener("touchend", (e) => {
            if (state.won) return;

            /* 判断点击（非滑动、短按） */
            const elapsed = Date.now() - touchStartTime;
            if (!touchMoved && e.changedTouches.length === 1 && elapsed < 300) {
                const t = e.changedTouches[0];
                handleTap(t.clientX, t.clientY);
                lastTouchTapAt = Date.now();
            }
        });

        wrap.addEventListener("click", (e) => {
            if (state.won || Date.now() - lastTouchTapAt < 500) return;
            handleTap(e.clientX, e.clientY);
        });

        wrap.addEventListener("wheel", (e) => {
            if (state.won) return;
            e.preventDefault();
            const rect = wrap.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            const direction = e.deltaY > 0 ? -1 : 1;
            const factor = direction > 0 ? 1.12 : 0.9;
            const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, state.scale * factor));
            const ratio = newScale / state.scale;
            state.offsetX = cx - ratio * (cx - state.offsetX);
            state.offsetY = cy - ratio * (cy - state.offsetY);
            state.scale = newScale;
            applyTransform();
        }, { passive: false });

        /* ===== 点击判定 ===== */
        function screenToCanvas(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            return {
                x: (sx - rect.left - state.offsetX) / state.scale,
                y: (sy - rect.top - state.offsetY) / state.scale,
            };
        }

        function handleTap(sx, sy) {
            const { x, y } = screenToCanvas(sx, sy);
            state.steps++;
            updateUI();

            /* 检查是否命中猫咪 */
            let hit = null;
            for (const c of state.cats) {
                if (c.found) continue;
                const dist = Math.hypot(c.x - x, c.y - y);
                if (dist <= c.r * HIT_RADIUS_MULT) {
                    hit = c;
                    break;
                }
            }

            if (hit) {
                hit.found = true;
                state.foundCount++;
                const combo = registerCombo();
                hideProximityToast();
                if (combo >= 2) showComboToast(combo);
                showHitMarker(sx, sy);
                showHitParticles(sx, sy);
                renderScene();
                updateUI();

                if (state.foundCount >= state.totalCats) {
                    state.won = true;
                    stopTimer();
                    setTimeout(showWinModal, 400);
                }
            } else {
                resetCombo();
                showMissMarker(sx, sy);
                showProximityFeedback(x, y);
            }
        }

        /* ===== 命中/未中动画 ===== */
        function showHitMarker(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            const size = 40;
            const el = document.createElement("div");
            el.className = "hit-marker";
            el.style.cssText = `left:${sx - rect.left - size / 2}px;top:${sy - rect.top - size / 2}px;width:${size}px;height:${size}px;`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function showHitParticles(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const angle = i / 8 * Math.PI * 2 + Math.random() * 0.28;
                const distance = 22 + Math.random() * 18;
                const el = document.createElement("span");
                el.className = "hit-particle";
                el.style.cssText = [
                    `left:${sx - rect.left}px`,
                    `top:${sy - rect.top}px`,
                    `--dx:${Math.cos(angle) * distance}px`,
                    `--dy:${Math.sin(angle) * distance}px`,
                    `animation-delay:${i * 12}ms`,
                ].join(";");
                wrap.appendChild(el);
                setTimeout(() => el.remove(), 760);
            }
        }

        function showMissMarker(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            const el = document.createElement("div");
            el.className = "miss-marker";
            el.style.cssText = `left:${sx - rect.left - 10}px;top:${sy - rect.top - 10}px;`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function showHintMarker(target) {
            const size = Math.max(46, target.r * state.scale * 3.2);
            const left = target.x * state.scale + state.offsetX - size / 2;
            const top = target.y * state.scale + state.offsetY - size / 2;
            const el = document.createElement("div");
            el.className = "hint-marker";
            el.style.cssText = `left:${left}px;top:${top}px;width:${size}px;height:${size}px;`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 1250);
        }

        let proximityTimer = null;
        let comboTimer = null;

        function registerCombo() {
            const now = Date.now();
            state.comboCount = state.lastFoundAt && now - state.lastFoundAt <= 3000 ? state.comboCount + 1 : 1;
            state.lastFoundAt = now;
            state.maxCombo = Math.max(state.maxCombo, state.comboCount);
            return state.comboCount;
        }

        function resetCombo() {
            state.comboCount = 0;
            state.lastFoundAt = 0;
        }

        function showComboToast(combo) {
            comboToast.textContent = `${combo} 连击`;
            comboToast.classList.add("show");
            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                comboToast.classList.remove("show");
                comboTimer = null;
            }, 900);
        }

        function showProximityFeedback(x, y) {
            const nearest = state.cats
                .filter((cat) => !cat.found)
                .map((cat) => ({ cat, dist: Math.hypot(cat.x - x, cat.y - y) }))
                .sort((a, b) => a.dist - b.dist)[0];
            if (!nearest) return;

            const near = nearest.dist <= nearest.cat.r * 4.2;
            const warm = nearest.dist <= nearest.cat.r * 8;
            const message = near ? "很近了，猫就在附近" : warm ? "有点接近，继续缩放观察" : "离猫还远，换个区域找找";
            proximityToast.textContent = message;
            proximityToast.classList.add("show");

            if (proximityTimer) clearTimeout(proximityTimer);
            proximityTimer = setTimeout(hideProximityToast, 1100);
        }

        function hideProximityToast() {
            proximityToast.classList.remove("show");
            if (proximityTimer) {
                clearTimeout(proximityTimer);
                proximityTimer = null;
            }
        }

        /* ===== 计时器 ===== */
        function startTimer() {
            if (state.timerInterval) return;
            state.startTime = Date.now() - state.elapsed * 1000;
            state.timerInterval = setInterval(() => {
                state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
                uiTimer.textContent = formatTime(state.elapsed);
            }, 250);
        }

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        function formatTime(sec) {
            const m = String(Math.floor(sec / 60)).padStart(2, "0");
            const s = String(sec % 60).padStart(2, "0");
            return `${m}:${s}`;
        }

        /* ===== UI 更新 ===== */
        function updateUI() {
            uiLevel.innerHTML = `第 ${state.level} 关<small>${sceneLabel(state.sceneTemplate)}</small>`;
            uiSteps.textContent = state.steps;
            uiProgressCount.textContent = `${state.foundCount} / ${state.totalCats}`;
            const pct = state.totalCats > 0 ? (state.foundCount / state.totalCats * 100) : 0;
            uiProgressFill.style.width = pct + "%";
            uiHintBadge.textContent = state.hints;
            uiTimer.textContent = formatTime(state.elapsed);

            if (state.hints <= 0) {
                btnHint.disabled = true;
            } else {
                btnHint.disabled = false;
            }
        }

        function sceneLabel(template) {
            const labels = {
                travel: "旅行线稿",
                harbor: "港口线稿",
                library: "图书馆线稿",
                garden: "花园线稿",
                kitchen: "厨房线稿",
                museum: "博物馆线稿",
            };
            return labels[template] || "线稿场景";
        }

        function starTargets(level, cats) {
            return {
                steps3: cats + Math.ceil(cats * 1.25) + 1 + Math.floor(level / 3),
                steps2: cats + Math.ceil(cats * 2.35) + 2 + Math.floor(level / 2),
                time3: 22 + cats * 8 + level * 2,
                time2: 42 + cats * 12 + level * 3,
            };
        }

        function calculateStars(level, cats, steps, elapsed, maxCombo = 0) {
            const targets = starTargets(level, cats);
            const comboBonus = Math.min(2, Math.max(0, maxCombo - 1));
            const effectiveSteps = Math.max(cats, steps - comboBonus);
            if (effectiveSteps <= targets.steps3 && elapsed <= targets.time3) return 3;
            if (effectiveSteps <= targets.steps2 && elapsed <= targets.time2) return 2;
            return 1;
        }

        function starText(stars) {
            return "★".repeat(stars) + "☆".repeat(3 - stars);
        }

        function ratingText(stars) {
            if (stars >= 3) return "满星通关。点击和用时都控制得很好。";
            if (stars === 2) return "表现不错，再减少误点或更快找到猫咪可冲击满星。";
            return "已通关。熟悉场景后再来一次，可以争取更高星级。";
        }

        /* ===== 通关弹层 ===== */
        function showWinModal() {
            const best = getBestLevel();
            if (state.level > best) {
                saveBestLevel(state.level);
            }
            const stars = calculateStars(state.level, state.totalCats, state.steps, state.elapsed, state.maxCombo);
            state.currentStars = stars;
            const levelBest = saveLevelRecord(state.level, {
                stars,
                steps: state.steps,
                elapsed: state.elapsed,
                scene: state.sceneTemplate,
                cats: state.totalCats,
                maxCombo: state.maxCombo,
                updatedAt: new Date().toISOString(),
            });

            $("#modalLevel").textContent = state.level;
            $("#modalCats").textContent = state.totalCats;
            $("#modalSteps").textContent = state.steps;
            $("#modalTime").textContent = formatTime(state.elapsed);
            $("#modalBestLevel").textContent = Math.max(state.level, best);
            $("#modalLevelBest").textContent = levelBest ? `${starText(levelBest.stars)} / ${formatTime(levelBest.elapsed)} / ${levelBest.steps} 次` : "--";
            $("#modalStars").textContent = starText(stars);
            $("#modalStars").setAttribute("aria-label", `本关 ${stars} 星`);
            $("#modalRating").textContent = state.maxCombo >= 2 ? `${ratingText(stars)} 最高 ${state.maxCombo} 连击已计入星级。` : ratingText(stars);

            winOverlay.classList.add("show");
            showWinConfetti();
        }

        function hideWinModal() {
            winOverlay.classList.remove("show");
        }

        function showWinConfetti() {
            const colors = ["var(--primary)", "var(--success)", "var(--warning)", "var(--error)"];
            for (let i = 0; i < 22; i++) {
                const angle = i / 22 * Math.PI * 2;
                const distance = 64 + Math.random() * 54;
                const el = document.createElement("span");
                el.className = "win-confetti";
                el.style.cssText = [
                    `background:${colors[i % colors.length]}`,
                    `--dx:${Math.cos(angle) * distance}px`,
                    `--dy:${Math.sin(angle) * distance - 42}px`,
                    `animation-delay:${(i % 6) * 18}ms`,
                ].join(";");
                winOverlay.appendChild(el);
                setTimeout(() => el.remove(), 980);
            }
        }

        /* ===== 持久化 ===== */
        function getBestLevel() {
            try {
                return parseInt(localStorage.getItem(STORAGE_PREFIX + "best-level")) || 0;
            } catch { return 0; }
        }

        function saveBestLevel(level) {
            try { localStorage.setItem(STORAGE_PREFIX + "best-level", level); } catch {}
        }

        function getLevelRecords() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_PREFIX + "level-records")) || {};
            } catch { return {}; }
        }

        function saveLevelRecords(records) {
            try { localStorage.setItem(STORAGE_PREFIX + "level-records", JSON.stringify(records)); } catch {}
        }

        function isBetterRecord(next, prev) {
            if (!prev) return true;
            if (next.stars !== prev.stars) return next.stars > prev.stars;
            if (next.elapsed !== prev.elapsed) return next.elapsed < prev.elapsed;
            return next.steps < prev.steps;
        }

        function saveLevelRecord(level, record) {
            const records = getLevelRecords();
            const key = String(level);
            if (isBetterRecord(record, records[key])) {
                records[key] = record;
                saveLevelRecords(records);
            }
            return records[key];
        }

        function markIntroSeen() {
            try { localStorage.setItem(STORAGE_PREFIX + "intro-seen", "1"); } catch {}
        }

        function hasSeenIntro() {
            try { return localStorage.getItem(STORAGE_PREFIX + "intro-seen") === "1"; } catch { return true; }
        }

        function openLevelPicker() {
            const best = Math.max(getBestLevel(), state.level);
            const records = getLevelRecords();
            const maxVisible = Math.max(best + 3, 12);
            levelGrid.innerHTML = "";
            for (let level = 1; level <= maxVisible; level++) {
                const button = document.createElement("button");
                const locked = level > best + 1;
                const record = records[String(level)];
                button.type = "button";
                button.className = `level-choice${locked ? " locked" : ""}`;
                button.innerHTML = `第 ${level} 关<small>${record ? starText(record.stars) : sceneLabel(sceneTemplateForLevel(level))}</small>`;
                button.disabled = locked;
                button.addEventListener("click", () => {
                    if (locked) return;
                    hideLevelPicker();
                    hideWinModal();
                    generateLevel(level);
                });
                levelGrid.appendChild(button);
            }
            levelOverlay.classList.add("show");
            requestAnimationFrame(updateLevelScrollHint);
        }

        function hideLevelPicker() {
            levelOverlay.classList.remove("show");
        }

        function updateLevelScrollHint() {
            const hasMore = levelGrid.scrollHeight - levelGrid.scrollTop > levelGrid.clientHeight + 8;
            levelPanel.classList.toggle("has-scroll", hasMore);
            levelScrollHint.textContent = hasMore ? "向下滑动查看更多关卡" : "已显示全部可选关卡";
        }

        function showIntroIfNeeded() {
            if (!hasSeenIntro()) {
                introOverlay.classList.add("show");
            }
        }

        function closeIntro() {
            markIntroSeen();
            introOverlay.classList.remove("show");
        }

        function shareResult() {
            const text = `我在找猫咪第 ${state.level} 关拿到 ${starText(state.currentStars || 1)}，用时 ${formatTime(state.elapsed)}，点击 ${state.steps} 次。`;
            if (navigator.share) {
                navigator.share({ title: "找猫咪", text }).catch(() => {});
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showShareFeedback("成绩已复制"));
                return;
            }
            showShareFeedback(text);
        }

        function showShareFeedback(text) {
            shareToast.textContent = text;
            shareToast.classList.add("show");
            setTimeout(() => shareToast.classList.remove("show"), 1400);
        }

        /* ===== 按钮事件 ===== */
        btnHint.addEventListener("click", () => {
            if (state.hints <= 0 || state.won) return;
            const unfound = state.cats.filter(c => !c.found);
            if (unfound.length === 0) return;

            state.hints--;
            updateUI();

            const target = unfound[Math.floor(state.hintRandom() * unfound.length)];

            /* 平滑移动到目标附近，保留玩家当前空间感。 */
            const vw = wrap.clientWidth;
            const vh = wrap.clientHeight;
            const targetScale = Math.max(state.scale, Math.min(MAX_SCALE, Math.max(1.45, state.scale * 1.18)));
            const driftX = (state.hintRandom() - 0.5) * vw * 0.18;
            const driftY = (state.hintRandom() - 0.5) * vh * 0.18;
            const targetOffsetX = vw / 2 - target.x * targetScale + driftX;
            const targetOffsetY = vh / 2 - target.y * targetScale + driftY;
            animateViewTo(targetScale, targetOffsetX, targetOffsetY, 560, () => showHintMarker(target));
        });

        btnResetView.addEventListener("click", () => {
            fitCanvasToView();
        });

        btnLevels.addEventListener("click", () => {
            openLevelPicker();
        });

        btnRestart.addEventListener("click", () => {
            stopTimer();
            hideWinModal();
            generateLevel(state.level, state.levelSeed);
        });

        btnReplay.addEventListener("click", () => {
            stopTimer();
            hideWinModal();
            generateLevel(state.level, state.levelSeed);
        });

        btnShare.addEventListener("click", () => {
            shareResult();
        });

        btnNext.addEventListener("click", () => {
            hideWinModal();
            generateLevel(state.level + 1);
        });

        btnIntroStart.addEventListener("click", () => {
            closeIntro();
        });

        btnCloseLevels.addEventListener("click", () => {
            hideLevelPicker();
        });

        levelGrid.addEventListener("scroll", () => {
            updateLevelScrollHint();
        });

        /* 窗口大小变化 */
        let resizeTimer = null;
        window.addEventListener("resize", () => {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const nextDpr = canvasDpr();
                if (Math.abs(nextDpr - state.dpr) > 0.01) {
                    state.dpr = configureCanvasForDpr(canvas, ctx, state.size, nextDpr);
                    buildBackgroundCache();
                    renderScene();
                }
                fitCanvasToView();
            }, 120);
        });

        /* ===== 启动 ===== */
        generateLevel(1);
        showIntroIfNeeded();
    })();
    </script>
    <script src="../js/game-back.js"></script>
</body>
</html>
