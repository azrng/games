<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找猫咪 - 游戏平台</title>
    <link rel="stylesheet" href="../css/custom.css">
    <style>
        :root {
            --page-bg: #fafbfc;
            --panel: #ffffff;
            --panel-muted: #f3f7fb;
            --paper: #fffdf7;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --text: #111827;
            --muted: #5b6475;
            --primary: #1a90ff;
            --primary-hover: #0078e0;
            --primary-soft: #eef4ff;
            --success: #10b981;
            --success-soft: #e6fbee;
            --warning: #f59e0b;
            --warning-soft: #fef3c7;
            --error: #ef4444;
            --error-soft: #fee2e2;
            --shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.08);
            --r-xl: 16px;
            --r-lg: 12px;
            --r-md: 8px;
            --r-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                linear-gradient(180deg, #ffffff 0%, var(--page-bg) 42%, #eef4ff 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== 整体布局 ===== */
        .game-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        /* ===== 顶部状态栏 ===== */
        .game-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
            z-index: 10;
        }

        .game-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .game-level {
            font-size: 13px;
            color: var(--muted);
        }

        .game-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            color: var(--muted);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--text);
        }

        /* ===== 进度条 ===== */
        .progress-bar-container {
            flex-shrink: 0;
            padding: 10px 16px 8px;
            background: var(--panel);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .progress-label { color: var(--muted); }
        .progress-count { font-weight: 600; color: var(--primary); }

        .progress-track {
            height: 8px;
            background: var(--panel-muted);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 999px;
            transition: width 300ms ease;
        }

        /* ===== 画布区域 ===== */
        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(26, 144, 255, 0.08), rgba(16, 185, 129, 0.08)),
                repeating-linear-gradient(0deg, rgba(17, 24, 39, 0.035) 0 1px, transparent 1px 26px),
                repeating-linear-gradient(90deg, rgba(17, 24, 39, 0.03) 0 1px, transparent 1px 26px),
                var(--panel-muted);
        }

        .canvas-wrap canvas {
            position: absolute;
            top: 0; left: 0;
            image-rendering: auto;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: var(--shadow);
        }

        /* ===== 底部操作栏 ===== */
        .game-footer {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--panel);
            border-top: 1px solid var(--border);
            box-shadow: 0 -8px 20px rgba(15, 23, 42, 0.08);
        }

        .btn {
            flex: 1;
            min-height: 44px;
            padding: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 150ms, border-color 150ms, transform 150ms;
            text-align: center;
        }

        .btn:active {
            background: var(--panel-muted);
            transform: translateY(1px);
        }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-primary:active { background: var(--primary-hover); }
        .btn-hint {
            position: relative;
        }
        .hint-badge {
            position: absolute;
            top: -6px; right: -4px;
            min-width: 18px; height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: var(--warning);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            line-height: 18px;
            text-align: center;
        }

        /* ===== 弹层 ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 200ms, visibility 200ms;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: min(340px, 90vw);
            background: var(--panel);
            border-radius: var(--r-xl);
            padding: 28px 24px 24px;
            box-shadow: var(--shadow);
            text-align: center;
            transform: translateY(20px);
            transition: transform 250ms ease;
        }

        .overlay.show .modal { transform: translateY(0); }

        .modal-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .modal-stat {
            padding: 10px 12px;
            background: var(--panel-muted);
            border-radius: var(--r-sm);
        }

        .modal-stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .modal-stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-stat-value.primary { color: var(--primary); }
        .modal-stat-value.success { color: var(--success); }

        .modal-best {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .modal-best span { color: var(--text); font-weight: 600; }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions .btn { flex: 1; padding: 12px 0; }

        /* ===== 命中动画 ===== */
        .hit-marker {
            position: absolute;
            pointer-events: none;
            border: 3px solid var(--success);
            border-radius: 50%;
            animation: hitPop 500ms ease forwards;
            box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.16);
        }

        @keyframes hitPop {
            0% { transform: scale(0.5); opacity: 1; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .miss-marker {
            position: absolute;
            pointer-events: none;
            width: 20px; height: 20px;
            animation: missFade 600ms ease forwards;
        }

        .miss-marker::before, .miss-marker::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 16px; height: 2px;
            background: var(--error);
            border-radius: 1px;
        }

        .miss-marker::before { transform: translate(-50%, -50%) rotate(45deg); }
        .miss-marker::after { transform: translate(-50%, -50%) rotate(-45deg); }

        @keyframes missFade {
            0% { opacity: 1; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1); }
        }

        /* ===== 猫咪已找到标记 ===== */
        .found-ring {
            position: absolute;
            pointer-events: none;
            border: 2.5px solid var(--success);
            border-radius: 50%;
            opacity: 0.6;
        }

        @media (max-width: 360px), (max-height: 680px) {
            .game-header {
                padding-top: 8px;
                padding-bottom: 8px;
            }

            .game-title {
                font-size: 16px;
            }

            .game-stats {
                gap: 10px;
                font-size: 12px;
            }

            .progress-bar-container {
                padding-top: 8px;
            }

            .game-footer {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-shell">
        <header class="game-header">
            <div>
                <div class="game-title">找猫咪</div>
                <div class="game-level" id="levelLabel">第 1 关</div>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span>点击</span>
                    <span class="stat-value" id="stepCount">0</span>
                </div>
                <div class="stat-item">
                    <span>时间</span>
                    <span class="stat-value" id="timerDisplay">00:00</span>
                </div>
            </div>
        </header>

        <div class="progress-bar-container">
            <div class="progress-info">
                <span class="progress-label">已找到猫咪</span>
                <span class="progress-count" id="progressCount">0 / 3</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="gameCanvas"></canvas>
        </div>

        <footer class="game-footer">
            <button class="btn btn-hint" id="btnHint" type="button">
                提示
                <span class="hint-badge" id="hintBadge">2</span>
            </button>
            <button class="btn" id="btnResetView" type="button">重置缩放</button>
            <button class="btn" id="btnRestart" type="button">重新开始</button>
        </footer>
    </div>

    <!-- 通关弹层 -->
    <div class="overlay" id="winOverlay">
        <div class="modal">
            <div class="modal-icon">🎉</div>
            <div class="modal-title">通关成功</div>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="modal-stat-label">当前关卡</div>
                    <div class="modal-stat-value primary" id="modalLevel">1</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">找到猫咪</div>
                    <div class="modal-stat-value success" id="modalCats">3</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">点击次数</div>
                    <div class="modal-stat-value" id="modalSteps">0</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">用时</div>
                    <div class="modal-stat-value" id="modalTime">00:00</div>
                </div>
            </div>
            <div class="modal-best">
                <div>最高关卡: <span id="modalBestLevel">0</span></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="btnNext" type="button">下一关</button>
            </div>
        </div>
    </div>

    <script>
    (function () {
        "use strict";

        /* ===== 常量与配置 ===== */
        const STORAGE_PREFIX = "hidden-cats-";
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 3.0;
        const HIT_RADIUS_MULT = 1.3;
        const SKETCH_LINE = "#757b84";
        const SKETCH_LIGHT = "#a7adb5";

        /* 每关猫咪数量：起始 3，每 3 关 +1，上限 10 */
        function catCount(level) {
            return Math.min(3 + Math.floor((level - 1) / 3), 10);
        }

        /* 画布尺寸随关卡递增 */
        function canvasSize(level) {
            const base = 1200;
            const growth = Math.min(level - 1, 20) * 80;
            return base + growth;
        }

        /* 干扰物数量 */
        function obstacleCount(cats, level) {
            const mult = 5 + Math.min(Math.floor(level / 5), 3);
            return cats * mult;
        }

        /* 每关提示次数 */
        const HINTS_PER_LEVEL = 2;

        /* ===== DOM 引用 ===== */
        const $ = (s) => document.querySelector(s);
        const canvas = $("#gameCanvas");
        const ctx = canvas.getContext("2d");
        const wrap = $("#canvasWrap");

        const uiLevel = $("#levelLabel");
        const uiSteps = $("#stepCount");
        const uiTimer = $("#timerDisplay");
        const uiProgressCount = $("#progressCount");
        const uiProgressFill = $("#progressFill");
        const uiHintBadge = $("#hintBadge");
        const btnHint = $("#btnHint");
        const btnResetView = $("#btnResetView");
        const btnRestart = $("#btnRestart");
        const btnNext = $("#btnNext");
        const winOverlay = $("#winOverlay");

        /* ===== 游戏状态 ===== */
        let state = {};

        function initState(level) {
            const size = canvasSize(level);
            const cats = catCount(level);
            state = {
                level,
                size,
                sceneSeed: Math.floor(Math.random() * 1000000),
                cats: [],           // { x, y, r, found, variant }
                obstacles: [],      // { x, y, type, scale, rotation }
                landmarks: [],
                foundCount: 0,
                totalCats: cats,
                steps: 0,
                hints: HINTS_PER_LEVEL,
                startTime: null,
                elapsed: 0,
                timerInterval: null,
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                won: false,
            };
        }

        /* ===== 绘制工具 ===== */

        /* 随机整数 [min, max] */
        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function randFloat(min, max) { return Math.random() * (max - min) + min; }

        function seededRandom(seed) {
            let value = seed % 2147483647;
            if (value <= 0) value += 2147483646;
            return () => {
                value = value * 16807 % 2147483647;
                return (value - 1) / 2147483646;
            };
        }

        function pickFrom(list, random) {
            return list[Math.floor(random() * list.length)];
        }

        /* 绘制隐藏在线稿中的小猫轮廓 */
        function drawCat(cx, cy, size, rotation, variant, found) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);

            const s = size;
            const fillColor = found ? "rgba(16,185,129,0.16)" : "rgba(251,251,248,0.02)";
            const lineColor = found ? "rgba(16,185,129,0.95)" : "#666d76";
            ctx.fillStyle = fillColor;
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = Math.max(1.1, s * 0.038);
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            const compact = variant % 4;
            const headY = compact === 1 ? -s * 0.02 : -s * 0.24;

            ctx.beginPath();
            if (compact === 0) {
                ctx.ellipse(0, s * 0.15, s * 0.34, s * 0.45, -0.05, 0, Math.PI * 2);
            } else if (compact === 1) {
                ctx.ellipse(-s * 0.02, s * 0.18, s * 0.52, s * 0.24, 0.04, 0, Math.PI * 2);
            } else if (compact === 2) {
                ctx.arc(0, s * 0.16, s * 0.33, 0, Math.PI * 2);
            } else {
                ctx.ellipse(-s * 0.04, s * 0.12, s * 0.48, s * 0.26, -0.18, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, headY, s * 0.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-s * 0.2, headY - s * 0.17);
            ctx.lineTo(-s * 0.33, headY - s * 0.46);
            ctx.lineTo(-s * 0.03, headY - s * 0.25);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(s * 0.2, headY - s * 0.17);
            ctx.lineTo(s * 0.33, headY - s * 0.46);
            ctx.lineTo(s * 0.03, headY - s * 0.25);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = found ? "rgba(16,185,129,0.95)" : "#737983";
            ctx.beginPath();
            ctx.arc(-s * 0.09, headY - s * 0.02, s * 0.022, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s * 0.09, headY - s * 0.02, s * 0.022, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = lineColor;
            ctx.beginPath();
            ctx.moveTo(-s * 0.05, headY + s * 0.08);
            ctx.lineTo(-s * 0.27, headY + s * 0.02);
            ctx.moveTo(-s * 0.04, headY + s * 0.13);
            ctx.lineTo(-s * 0.28, headY + s * 0.14);
            ctx.moveTo(s * 0.05, headY + s * 0.08);
            ctx.lineTo(s * 0.27, headY + s * 0.02);
            ctx.moveTo(s * 0.04, headY + s * 0.13);
            ctx.lineTo(s * 0.28, headY + s * 0.14);
            ctx.stroke();

            ctx.beginPath();
            const tailDir = compact % 2 === 0 ? 1 : -1;
            ctx.moveTo(tailDir * s * 0.32, s * 0.12);
            ctx.quadraticCurveTo(
                tailDir * s * 0.7, -s * 0.08,
                tailDir * s * 0.46, -s * 0.38
            );
            ctx.stroke();

            ctx.restore();
        }

        function drawCatDecoy(x, y, size, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            sketchStyle(Math.max(0.9, size * 0.035), SKETCH_LIGHT);
            ctx.beginPath();
            ctx.arc(0, -size * 0.18, size * 0.22, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-size * 0.16, -size * 0.34);
            ctx.lineTo(-size * 0.26, -size * 0.58);
            ctx.lineTo(-size * 0.02, -size * 0.42);
            ctx.moveTo(size * 0.16, -size * 0.34);
            ctx.lineTo(size * 0.26, -size * 0.58);
            ctx.lineTo(size * 0.02, -size * 0.42);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(0, size * 0.14, size * 0.42, size * 0.24, 0.12, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(size * 0.34, size * 0.1);
            ctx.quadraticCurveTo(size * 0.62, -size * 0.08, size * 0.42, -size * 0.28);
            ctx.stroke();
            ctx.restore();
        }

        function sketchStyle(width = 1.4, color = SKETCH_LINE) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
        }

        function strokeEllipse(x, y, rx, ry, rot = 0) {
            ctx.beginPath();
            ctx.ellipse(x, y, rx, ry, rot, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawCloud(x, y, scale = 1, random = Math.random) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            sketchStyle(1.5, SKETCH_LIGHT);
            const lift = (random() - 0.5) * 18;
            ctx.beginPath();
            ctx.moveTo(-86, 10);
            ctx.bezierCurveTo(-64, -24 + lift, -32, -24, -18, -4);
            ctx.bezierCurveTo(2, -44, 50, -38 + lift, 60, -2);
            ctx.bezierCurveTo(94, -4, 112, 14, 94, 32);
            ctx.lineTo(-72, 32);
            ctx.bezierCurveTo(-108, 30, -112, 14, -86, 10);
            ctx.stroke();
            ctx.restore();
        }

        function drawBird(x, y, scale = 1, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.scale(scale, scale);
            sketchStyle(1.6, SKETCH_LINE);
            ctx.beginPath();
            ctx.moveTo(-52, 0);
            ctx.quadraticCurveTo(-22, -40, 0, -6);
            ctx.quadraticCurveTo(28, -42, 56, -2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(20, 6);
            ctx.lineTo(0, 12);
            ctx.stroke();
            ctx.restore();
        }

        function drawColosseum(x, y, w, h, lean = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(lean);
            sketchStyle(2, SKETCH_LINE);
            ctx.beginPath();
            ctx.moveTo(0, h * 0.16);
            ctx.quadraticCurveTo(w * 0.46, -h * 0.05, w, h * 0.12);
            ctx.lineTo(w * 0.92, h);
            ctx.lineTo(w * 0.05, h);
            ctx.closePath();
            ctx.stroke();

            for (let row = 0; row < 5; row++) {
                const yy = h * (0.2 + row * 0.16);
                ctx.beginPath();
                ctx.moveTo(w * 0.03, yy);
                ctx.quadraticCurveTo(w * 0.48, yy - h * 0.05, w * 0.96, yy);
                ctx.stroke();
            }

            for (let row = 0; row < 4; row++) {
                const yy = h * (0.27 + row * 0.16);
                for (let i = 0; i < 9; i++) {
                    const ax = w * (0.1 + i * 0.09);
                    const aw = w * 0.055;
                    const ah = h * 0.09;
                    ctx.beginPath();
                    ctx.moveTo(ax, yy + ah);
                    ctx.lineTo(ax, yy + ah * 0.38);
                    ctx.quadraticCurveTo(ax + aw * 0.5, yy - ah * 0.25, ax + aw, yy + ah * 0.38);
                    ctx.lineTo(ax + aw, yy + ah);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function drawLeaningTower(x, y, w, h, lean = -0.08) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(lean);
            sketchStyle(2, SKETCH_LINE);
            ctx.strokeRect(0, 0, w, h);
            for (let row = 0; row < 7; row++) {
                const yy = h * (0.08 + row * 0.125);
                ctx.beginPath();
                ctx.moveTo(-w * 0.08, yy);
                ctx.lineTo(w * 1.08, yy);
                ctx.stroke();
                for (let i = 0; i < 5; i++) {
                    const ax = w * (0.12 + i * 0.17);
                    ctx.beginPath();
                    ctx.moveTo(ax, yy + h * 0.08);
                    ctx.lineTo(ax, yy + h * 0.03);
                    ctx.quadraticCurveTo(ax + w * 0.055, yy - h * 0.02, ax + w * 0.11, yy + h * 0.03);
                    ctx.lineTo(ax + w * 0.11, yy + h * 0.08);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function drawStreetBlocks(size, random) {
            sketchStyle(1.5, SKETCH_LINE);
            const baseY = size * (0.44 + random() * 0.05);
            const count = 6 + Math.floor(random() * 3);
            for (let i = 0; i < count; i++) {
                const x = size * (0.39 + i * (0.046 + random() * 0.015));
                const y = baseY - (i % 3) * size * (0.025 + random() * 0.018);
                const w = size * (0.055 + random() * 0.03);
                const h = size * (0.15 + random() * 0.08);
                ctx.strokeRect(x, y, w, h);
                ctx.beginPath();
                ctx.moveTo(x - w * 0.08, y);
                ctx.lineTo(x + w * 0.5, y - h * 0.18);
                ctx.lineTo(x + w * 1.08, y);
                ctx.stroke();
                for (let yy = y + h * 0.18; yy < y + h * 0.86; yy += h * 0.22) {
                    for (let xx = x + w * 0.18; xx < x + w * 0.78; xx += w * 0.32) {
                        ctx.strokeRect(xx, yy, w * 0.16, h * 0.12);
                    }
                }
            }
        }

        function drawAirship(size, random) {
            const x = size * (0.48 + random() * 0.16);
            const y = size * (0.04 + random() * 0.06);
            const w = size * (0.22 + random() * 0.1);
            const h = size * (0.075 + random() * 0.035);
            ctx.save();
            sketchStyle(1.7, SKETCH_LINE);
            strokeEllipse(x + w * 0.5, y + h * 0.5, w * 0.5, h * 0.5);
            for (let i = 1; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(x + w * (i / 6), y + h * 0.06);
                ctx.quadraticCurveTo(x + w * 0.52, y + h * 0.5, x + w * (i / 6), y + h * 0.94);
                ctx.stroke();
            }
            ctx.strokeRect(x + w * 0.26, y + h * 0.78, w * 0.32, h * 0.28);
            ctx.beginPath();
            ctx.moveTo(x + w * 0.98, y + h * 0.5);
            ctx.lineTo(x + w * 1.1, y + h * 0.38);
            ctx.lineTo(x + w * 1.08, y + h * 0.62);
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        }

        function drawArtistAndTable(size, random) {
            ctx.save();
            sketchStyle(1.8, SKETCH_LINE);
            const cx = size * (0.79 + random() * 0.08);
            const cy = size * (0.18 + random() * 0.05);
            strokeEllipse(cx, cy, size * 0.04, size * 0.055);
            ctx.beginPath();
            ctx.moveTo(cx - size * 0.045, cy - size * 0.05);
            ctx.quadraticCurveTo(cx, cy - size * 0.12, cx + size * 0.055, cy - size * 0.05);
            ctx.stroke();
            for (let i = 0; i < 9; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - size * 0.055 + i * size * 0.014, cy + size * 0.05);
                ctx.quadraticCurveTo(cx - size * 0.03 + i * size * 0.01, cy + size * 0.13, cx - size * 0.015 + i * size * 0.01, cy + size * 0.19);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(cx - size * 0.07, cy + size * 0.08);
            ctx.lineTo(cx - size * 0.12, cy + size * 0.32);
            ctx.moveTo(cx + size * 0.07, cy + size * 0.08);
            ctx.lineTo(cx + size * 0.12, cy + size * 0.32);
            ctx.stroke();

            const tx = size * (0.61 + random() * 0.04);
            const ty = size * (0.56 + random() * 0.05);
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(size * 0.98, ty + size * 0.04);
            ctx.lineTo(size * 0.93, size * 0.93);
            ctx.lineTo(tx - size * 0.03, size * 0.82);
            ctx.closePath();
            ctx.stroke();
            for (let i = 0; i < 8; i++) {
                strokeEllipse(tx + size * (0.06 + i * 0.035), ty + size * (0.09 + (i % 3) * 0.075), size * 0.035, size * 0.02, i * 0.35);
            }
            ctx.restore();
        }

        function drawHillsAndRoads(size, random) {
            sketchStyle(1.4, SKETCH_LIGHT);
            for (let i = 0; i < 6; i++) {
                const y = size * (0.56 + i * (0.038 + random() * 0.012));
                ctx.beginPath();
                ctx.moveTo(size * 0.28, y);
                for (let x = size * 0.34; x < size * 0.68; x += size * 0.08) {
                    ctx.quadraticCurveTo(x, y - size * 0.04, x + size * 0.07, y);
                }
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(size * 0.45, size * 0.95);
            ctx.bezierCurveTo(size * 0.5, size * 0.78, size * 0.58, size * 0.75, size * 0.63, size * 0.58);
            ctx.stroke();
        }

        function drawDenseLinework(size, random) {
            sketchStyle(1, "rgba(117,123,132,0.72)");
            const windowCount = 75 + Math.floor(random() * 45);
            for (let i = 0; i < windowCount; i++) {
                const x = size * (0.03 + random() * 0.92);
                const y = size * (0.18 + random() * 0.68);
                const w = size * (0.012 + random() * 0.018);
                const h = size * (0.018 + random() * 0.026);
                if (random() < 0.55) {
                    ctx.strokeRect(x, y, w, h);
                    ctx.beginPath();
                    ctx.moveTo(x + w * 0.5, y);
                    ctx.lineTo(x + w * 0.5, y + h);
                    ctx.moveTo(x, y + h * 0.5);
                    ctx.lineTo(x + w, y + h * 0.5);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(x, y + h);
                    ctx.lineTo(x, y + h * 0.35);
                    ctx.quadraticCurveTo(x + w * 0.5, y - h * 0.15, x + w, y + h * 0.35);
                    ctx.lineTo(x + w, y + h);
                    ctx.stroke();
                }
            }

            const textureCount = 95 + Math.floor(random() * 60);
            for (let i = 0; i < textureCount; i++) {
                const x = size * random();
                const y = size * random();
                const len = size * (0.015 + random() * 0.035);
                const angle = random() * Math.PI;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(
                    x + Math.cos(angle + 0.8) * len * 0.45,
                    y + Math.sin(angle + 0.8) * len * 0.45,
                    x + Math.cos(angle) * len,
                    y + Math.sin(angle) * len
                );
                ctx.stroke();
            }

            const decoyCount = 18 + Math.floor(random() * 12);
            for (let i = 0; i < decoyCount; i++) {
                drawCatDecoy(
                    size * (0.04 + random() * 0.9),
                    size * (0.18 + random() * 0.74),
                    size * (0.018 + random() * 0.014),
                    random() * 1.2 - 0.6
                );
            }
        }

        /* 绘制干扰物 */
        function drawObstacle(o) {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rotation);
            ctx.scale(o.scale, o.scale);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 1.2;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            const s = o.size;

            switch (o.type) {
                case "tree":
                    ctx.beginPath();
                    ctx.moveTo(0, s * 0.4);
                    ctx.lineTo(0, -s * 0.1);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.3, s * 0.1);
                    ctx.lineTo(0, -s * 0.35);
                    ctx.lineTo(s * 0.3, s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "house":
                    ctx.strokeRect(-s * 0.3, -s * 0.1, s * 0.6, s * 0.5);
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.35, -s * 0.1);
                    ctx.lineTo(0, -s * 0.4);
                    ctx.lineTo(s * 0.35, -s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "flower":
                    ctx.beginPath();
                    ctx.moveTo(0, s * 0.35);
                    ctx.lineTo(0, -s * 0.05);
                    ctx.stroke();
                    for (let i = 0; i < 5; i++) {
                        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
                        ctx.beginPath();
                        ctx.arc(Math.cos(a) * s * 0.12, -s * 0.15 + Math.sin(a) * s * 0.12, s * 0.07, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    break;
                case "bottle":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.1, -s * 0.35);
                    ctx.lineTo(-s * 0.1, -s * 0.2);
                    ctx.lineTo(-s * 0.2, -s * 0.15);
                    ctx.lineTo(-s * 0.2, s * 0.3);
                    ctx.lineTo(s * 0.2, s * 0.3);
                    ctx.lineTo(s * 0.2, -s * 0.15);
                    ctx.lineTo(s * 0.1, -s * 0.2);
                    ctx.lineTo(s * 0.1, -s * 0.35);
                    ctx.stroke();
                    break;
                case "book":
                    ctx.strokeRect(-s * 0.25, -s * 0.2, s * 0.5, s * 0.4);
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.05, -s * 0.2);
                    ctx.lineTo(-s * 0.05, s * 0.2);
                    ctx.stroke();
                    break;
                case "star":
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const outerA = (i * 72 - 90) * Math.PI / 180;
                        const innerA = ((i * 72 + 36) - 90) * Math.PI / 180;
                        const ox = Math.cos(outerA) * s * 0.25;
                        const oy = Math.sin(outerA) * s * 0.25;
                        const ix = Math.cos(innerA) * s * 0.1;
                        const iy = Math.sin(innerA) * s * 0.1;
                        if (i === 0) ctx.moveTo(ox, oy);
                        else ctx.lineTo(ox, oy);
                        ctx.lineTo(ix, iy);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case "cloud":
                    ctx.beginPath();
                    ctx.arc(-s * 0.15, 0, s * 0.15, 0, Math.PI * 2);
                    ctx.arc(s * 0.05, -s * 0.08, s * 0.18, 0, Math.PI * 2);
                    ctx.arc(s * 0.2, 0, s * 0.13, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case "fish":
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s * 0.25, s * 0.12, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(s * 0.2, 0);
                    ctx.lineTo(s * 0.38, -s * 0.1);
                    ctx.lineTo(s * 0.38, s * 0.1);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(-s * 0.1, -s * 0.02, s * 0.02, 0, Math.PI * 2);
                    ctx.fillStyle = "#555";
                    ctx.fill();
                    break;
                case "mushroom":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.05, s * 0.25);
                    ctx.lineTo(-s * 0.05, 0);
                    ctx.lineTo(s * 0.05, 0);
                    ctx.lineTo(s * 0.05, s * 0.25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(0, -s * 0.05, s * 0.2, s * 0.15, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case "window":
                    ctx.strokeRect(-s * 0.22, -s * 0.3, s * 0.44, s * 0.6);
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.3);
                    ctx.lineTo(0, s * 0.3);
                    ctx.moveTo(-s * 0.22, 0);
                    ctx.lineTo(s * 0.22, 0);
                    ctx.stroke();
                    break;
                case "plate":
                    strokeEllipse(0, 0, s * 0.34, s * 0.2, 0.08);
                    strokeEllipse(0, 0, s * 0.2, s * 0.1, 0.08);
                    break;
                case "leaf":
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.28, s * 0.18);
                    ctx.quadraticCurveTo(0, -s * 0.36, s * 0.3, s * 0.16);
                    ctx.quadraticCurveTo(0, s * 0.28, -s * 0.28, s * 0.18);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.16, s * 0.16);
                    ctx.lineTo(s * 0.2, -s * 0.08);
                    ctx.stroke();
                    break;
            }
            ctx.restore();
        }

        /* 绘制参考图风格的大幅线稿场景 */
        function drawTravelSketchScene(size) {
            const random = seededRandom(state.sceneSeed);
            ctx.fillStyle = "#fbfbf8";
            ctx.fillRect(0, 0, size, size);

            const cloudCount = 4 + Math.floor(random() * 3);
            for (let i = 0; i < cloudCount; i++) {
                drawCloud(size * (0.08 + random() * 0.86), size * (0.04 + random() * 0.16), size / (1050 + random() * 360), random);
            }

            drawAirship(size, random);

            const birdCount = 2 + Math.floor(random() * 4);
            for (let i = 0; i < birdCount; i++) {
                drawBird(size * (0.04 + random() * 0.3), size * (0.06 + random() * 0.2), size / (1200 + random() * 500), random() - 0.5);
            }

            const colosseumX = size * (0.005 + random() * 0.035);
            drawColosseum(colosseumX, size * (0.29 + random() * 0.04), size * (0.25 + random() * 0.06), size * (0.42 + random() * 0.08), (random() - 0.5) * 0.06);
            drawLeaningTower(size * (0.27 + random() * 0.06), size * (0.18 + random() * 0.06), size * (0.12 + random() * 0.04), size * (0.54 + random() * 0.08), -0.12 + random() * 0.08);
            drawStreetBlocks(size, random);
            drawHillsAndRoads(size, random);
            drawArtistAndTable(size, random);
            drawDenseLinework(size, random);
        }

        /* ===== 场景生成 ===== */
        const OBSTACLE_TYPES = ["tree", "house", "flower", "bottle", "book", "star", "cloud", "fish", "mushroom", "window", "plate", "leaf"];

        function sceneCatAnchors(size) {
            const random = seededRandom(state.sceneSeed + 31);
            const jitter = (value, spread) => value + (random() - 0.5) * spread;
            return [
                { x: jitter(size * 0.08, size * 0.03), y: jitter(size * 0.58, size * 0.04), r: size * 0.017, variant: 0, rotation: -0.18 },
                { x: jitter(size * 0.16, size * 0.05), y: jitter(size * 0.43, size * 0.05), r: size * 0.016, variant: 2, rotation: 0.12 },
                { x: jitter(size * 0.23, size * 0.04), y: jitter(size * 0.67, size * 0.04), r: size * 0.018, variant: 1, rotation: 0.04 },
                { x: jitter(size * 0.34, size * 0.04), y: jitter(size * 0.31, size * 0.04), r: size * 0.015, variant: 0, rotation: -0.08 },
                { x: jitter(size * 0.37, size * 0.04), y: jitter(size * 0.62, size * 0.04), r: size * 0.017, variant: 3, rotation: 0.3 },
                { x: jitter(size * 0.48, size * 0.05), y: jitter(size * 0.42, size * 0.04), r: size * 0.015, variant: 0, rotation: 0.05 },
                { x: jitter(size * 0.55, size * 0.05), y: jitter(size * 0.51, size * 0.04), r: size * 0.017, variant: 1, rotation: -0.2 },
                { x: jitter(size * 0.61, size * 0.05), y: jitter(size * 0.22, size * 0.04), r: size * 0.015, variant: 3, rotation: 0.18 },
                { x: jitter(size * 0.72, size * 0.05), y: jitter(size * 0.56, size * 0.04), r: size * 0.016, variant: 0, rotation: -0.08 },
                { x: jitter(size * 0.79, size * 0.05), y: jitter(size * 0.33, size * 0.04), r: size * 0.017, variant: 1, rotation: 0.2 },
                { x: jitter(size * 0.86, size * 0.04), y: jitter(size * 0.68, size * 0.04), r: size * 0.016, variant: 2, rotation: 0.16 },
                { x: jitter(size * 0.93, size * 0.04), y: jitter(size * 0.48, size * 0.04), r: size * 0.015, variant: 0, rotation: -0.25 },
                { x: jitter(size * 0.44, size * 0.05), y: jitter(size * 0.76, size * 0.04), r: size * 0.016, variant: 2, rotation: 0.1 },
                { x: jitter(size * 0.64, size * 0.05), y: jitter(size * 0.73, size * 0.04), r: size * 0.015, variant: 3, rotation: -0.18 },
            ];
        }

        function shuffledAnchors(size) {
            const anchors = sceneCatAnchors(size).slice();
            for (let i = anchors.length - 1; i > 0; i--) {
                const j = randInt(0, i);
                [anchors[i], anchors[j]] = [anchors[j], anchors[i]];
            }
            return anchors;
        }

        function generateLevel(level) {
            stopTimer();
            initState(level);
            const size = state.size;
            const cats = state.totalCats;
            const obs = obstacleCount(cats, level) + 18;

            /* 生成猫咪位置：优先嵌入线稿地标、窗洞、餐桌和云边。 */
            const anchors = shuffledAnchors(size);
            state.cats = anchors.slice(0, cats).map((anchor) => ({
                x: anchor.x + randFloat(-size * 0.008, size * 0.008),
                y: anchor.y + randFloat(-size * 0.008, size * 0.008),
                r: Math.max(18, Math.min(32, anchor.r)),
                found: false,
                variant: anchor.variant,
                rotation: anchor.rotation + randFloat(-0.12, 0.12),
            }));

            /* 生成干扰物 */
            const padding = size * 0.08;
            for (let i = 0; i < obs; i++) {
                state.obstacles.push({
                    x: randFloat(padding * 0.5, size - padding * 0.5),
                    y: randFloat(padding * 0.5, size - padding * 0.5),
                    type: OBSTACLE_TYPES[randInt(0, OBSTACLE_TYPES.length - 1)],
                    size: randInt(35, 65),
                    scale: randFloat(0.7, 1.3),
                    rotation: randFloat(-0.6, 0.6),
                });
            }

            /* 设置画布像素尺寸 */
            canvas.width = size;
            canvas.height = size;

            /* 初始缩放：让画布适应视口 */
            fitCanvasToView();

            /* 渲染 */
            renderScene();
            updateUI();
            startTimer();
        }

        /* ===== 渲染 ===== */
        function renderScene() {
            const size = state.size;
            ctx.clearRect(0, 0, size, size);

            drawTravelSketchScene(size);

            /* 线稿干扰物 */
            state.obstacles.forEach(drawObstacle);

            /* 小猫轮廓藏在线稿细节里 */
            state.cats.forEach(c => {
                drawCat(c.x, c.y, c.r, c.rotation, c.variant, c.found);
            });
        }

        /* ===== 画布视口变换 ===== */
        function fitCanvasToView() {
            const vw = wrap.clientWidth;
            const vh = wrap.clientHeight;
            const size = state.size;
            const fitScale = Math.min(vw / size, vh / size);
            state.scale = fitScale * 0.9;
            state.offsetX = (vw - size * state.scale) / 2;
            state.offsetY = (vh - size * state.scale) / 2;
            applyTransform();
        }

        function applyTransform() {
            clampView();
            canvas.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
            canvas.style.transformOrigin = "0 0";
        }

        function clampView() {
            const vw = wrap.clientWidth;
            const vh = wrap.clientHeight;
            const scaled = state.size * state.scale;
            const margin = 16;

            if (scaled <= vw) {
                state.offsetX = (vw - scaled) / 2;
            } else {
                const minX = vw - scaled - margin;
                const maxX = margin;
                state.offsetX = Math.min(maxX, Math.max(minX, state.offsetX));
            }

            if (scaled <= vh) {
                state.offsetY = (vh - scaled) / 2;
            } else {
                const minY = vh - scaled - margin;
                const maxY = margin;
                state.offsetY = Math.min(maxY, Math.max(minY, state.offsetY));
            }
        }

        /* ===== 触控交互 ===== */
        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let panStartX = 0, panStartY = 0;
        let panStartOffX = 0, panStartOffY = 0;
        let touchStartTime = 0;
        let touchMoved = false;
        let lastTouchTapAt = 0;

        function getTouchDist(t1, t2) {
            return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }

        wrap.addEventListener("touchstart", (e) => {
            if (state.won) return;
            e.preventDefault();

            if (e.touches.length === 1) {
                touchStartTime = Date.now();
                touchMoved = false;
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
                panStartOffX = state.offsetX;
                panStartOffY = state.offsetY;
            } else if (e.touches.length === 2) {
                pinchStartDist = getTouchDist(e.touches[0], e.touches[1]);
                pinchStartScale = state.scale;
            }
        }, { passive: false });

        wrap.addEventListener("touchmove", (e) => {
            if (state.won) return;
            e.preventDefault();

            if (e.touches.length === 1) {
                const dx = e.touches[0].clientX - panStartX;
                const dy = e.touches[0].clientY - panStartY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchMoved = true;
                state.offsetX = panStartOffX + dx;
                state.offsetY = panStartOffY + dy;
                applyTransform();
            } else if (e.touches.length === 2) {
                touchMoved = true;
                const dist = getTouchDist(e.touches[0], e.touches[1]);
                const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
                const rect = wrap.getBoundingClientRect();
                const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const ratio = newScale / state.scale;
                state.offsetX = cx - ratio * (cx - state.offsetX);
                state.offsetY = cy - ratio * (cy - state.offsetY);
                state.scale = newScale;
                applyTransform();
            }
        }, { passive: false });

        wrap.addEventListener("touchend", (e) => {
            if (state.won) return;

            /* 判断点击（非滑动、短按） */
            const elapsed = Date.now() - touchStartTime;
            if (!touchMoved && e.changedTouches.length === 1 && elapsed < 300) {
                const t = e.changedTouches[0];
                handleTap(t.clientX, t.clientY);
                lastTouchTapAt = Date.now();
            }
        });

        wrap.addEventListener("click", (e) => {
            if (state.won || Date.now() - lastTouchTapAt < 500) return;
            handleTap(e.clientX, e.clientY);
        });

        /* ===== 点击判定 ===== */
        function screenToCanvas(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            return {
                x: (sx - rect.left - state.offsetX) / state.scale,
                y: (sy - rect.top - state.offsetY) / state.scale,
            };
        }

        function handleTap(sx, sy) {
            const { x, y } = screenToCanvas(sx, sy);
            state.steps++;
            updateUI();

            /* 检查是否命中猫咪 */
            let hit = null;
            for (const c of state.cats) {
                if (c.found) continue;
                const dist = Math.hypot(c.x - x, c.y - y);
                if (dist <= c.r * HIT_RADIUS_MULT) {
                    hit = c;
                    break;
                }
            }

            if (hit) {
                hit.found = true;
                state.foundCount++;
                showHitMarker(sx, sy);
                renderScene();
                updateUI();

                if (state.foundCount >= state.totalCats) {
                    state.won = true;
                    stopTimer();
                    setTimeout(showWinModal, 400);
                }
            } else {
                showMissMarker(sx, sy);
            }
        }

        /* ===== 命中/未中动画 ===== */
        function showHitMarker(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            const size = 40;
            const el = document.createElement("div");
            el.className = "hit-marker";
            el.style.cssText = `left:${sx - rect.left - size / 2}px;top:${sy - rect.top - size / 2}px;width:${size}px;height:${size}px;`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function showMissMarker(sx, sy) {
            const rect = wrap.getBoundingClientRect();
            const el = document.createElement("div");
            el.className = "miss-marker";
            el.style.cssText = `left:${sx - rect.left - 10}px;top:${sy - rect.top - 10}px;`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        /* ===== 计时器 ===== */
        function startTimer() {
            if (state.timerInterval) return;
            state.startTime = Date.now() - state.elapsed * 1000;
            state.timerInterval = setInterval(() => {
                state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
                uiTimer.textContent = formatTime(state.elapsed);
            }, 250);
        }

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        function formatTime(sec) {
            const m = String(Math.floor(sec / 60)).padStart(2, "0");
            const s = String(sec % 60).padStart(2, "0");
            return `${m}:${s}`;
        }

        /* ===== UI 更新 ===== */
        function updateUI() {
            uiLevel.textContent = `第 ${state.level} 关`;
            uiSteps.textContent = state.steps;
            uiProgressCount.textContent = `${state.foundCount} / ${state.totalCats}`;
            const pct = state.totalCats > 0 ? (state.foundCount / state.totalCats * 100) : 0;
            uiProgressFill.style.width = pct + "%";
            uiHintBadge.textContent = state.hints;
            uiTimer.textContent = formatTime(state.elapsed);

            if (state.hints <= 0) {
                btnHint.disabled = true;
            } else {
                btnHint.disabled = false;
            }
        }

        /* ===== 通关弹层 ===== */
        function showWinModal() {
            const best = getBestLevel();
            if (state.level > best) {
                saveBestLevel(state.level);
            }

            $("#modalLevel").textContent = state.level;
            $("#modalCats").textContent = state.totalCats;
            $("#modalSteps").textContent = state.steps;
            $("#modalTime").textContent = formatTime(state.elapsed);
            $("#modalBestLevel").textContent = Math.max(state.level, best);

            winOverlay.classList.add("show");
        }

        function hideWinModal() {
            winOverlay.classList.remove("show");
        }

        /* ===== 持久化 ===== */
        function getBestLevel() {
            try {
                return parseInt(localStorage.getItem(STORAGE_PREFIX + "best-level")) || 0;
            } catch { return 0; }
        }

        function saveBestLevel(level) {
            try { localStorage.setItem(STORAGE_PREFIX + "best-level", level); } catch {}
        }

        /* ===== 按钮事件 ===== */
        btnHint.addEventListener("click", () => {
            if (state.hints <= 0 || state.won) return;
            const unfound = state.cats.filter(c => !c.found);
            if (unfound.length === 0) return;

            state.hints--;
            updateUI();

            const target = unfound[Math.floor(Math.random() * unfound.length)];

            /* 平移缩放到目标猫咪 */
            const vw = wrap.clientWidth;
            const vh = wrap.clientHeight;
            state.scale = Math.min(MAX_SCALE, 2.0);
            state.offsetX = vw / 2 - target.x * state.scale;
            state.offsetY = vh / 2 - target.y * state.scale;
            applyTransform();

            /* 闪烁高亮 */
            let blinks = 0;
            const interval = setInterval(() => {
                blinks++;
                if (blinks % 2 === 0) {
                    ctx.save();
                    ctx.strokeStyle = "rgba(47,158,68,0.8)";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(target.x, target.y, target.r * 1.2, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    renderScene();
                }
                if (blinks >= 6) {
                    clearInterval(interval);
                    renderScene();
                }
            }, 300);
        });

        btnResetView.addEventListener("click", () => {
            fitCanvasToView();
        });

        btnRestart.addEventListener("click", () => {
            stopTimer();
            hideWinModal();
            generateLevel(state.level);
        });

        btnNext.addEventListener("click", () => {
            hideWinModal();
            generateLevel(state.level + 1);
        });

        /* 窗口大小变化 */
        window.addEventListener("resize", () => {
            fitCanvasToView();
        });

        /* ===== 启动 ===== */
        generateLevel(1);
    })();
    </script>
    <script src="../js/game-back.js"></script>
</body>
</html>
