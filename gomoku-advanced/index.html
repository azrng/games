<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <div class="page-copy">
                <p class="page-eyebrow">智能对局</p>
                <h1>五子棋</h1>
                <p class="page-description">保留高阶 AI、提示与主题切换能力，移除调试信息，针对移动端重新整理布局。</p>
            </div>
            <div class="game-info">
                <div class="info-card">
                    <span class="info-label">当前状态</span>
                    <span id="status-text" class="info-value">点击“开始”进入游戏</span>
                </div>
                <div class="info-card">
                    <span class="info-label">步数</span>
                    <span id="step-count" class="info-value">0</span>
                </div>
            </div>
        </header>

        <main class="game-layout">
            <section class="board-panel">
                <div class="board-panel-header">
                    <h2>棋盘</h2>
                    <p>轻触棋盘即可落子，支持移动端操作。</p>
                </div>
                <div class="board-stage">
                    <canvas id="board-canvas"></canvas>
                    <div id="loading-overlay" class="loading-overlay hidden">AI 思考中...</div>
                </div>
            </section>

            <aside class="control-panel">
                <section class="panel-card">
                    <h2>对局操作</h2>
                    <div class="action-buttons">
                        <button id="start-btn" type="button">开始</button>
                        <button id="undo-btn" type="button" disabled>悔棋</button>
                        <button id="resign-btn" type="button" disabled>认输</button>
                        <button id="hint-btn" type="button">提示 (3)</button>
                    </div>
                </section>

                <section class="panel-card">
                    <h2>对局设置</h2>
                    <div class="settings">
                        <div class="setting-row">
                            <label for="ai-first">电脑先手</label>
                            <div class="toggle">
                                <input type="checkbox" id="ai-first" checked>
                                <span class="toggle-slider"></span>
                            </div>
                        </div>
                        <div class="setting-row">
                            <label for="difficulty">难度</label>
                            <select id="difficulty">
                                <option value="2">入门 (2 层)</option>
                                <option value="4" selected>简单 (4 层)</option>
                                <option value="6">标准 (6 层)</option>
                                <option value="8">困难 (8 层)</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="theme">棋盘主题</label>
                            <select id="theme">
                                <option value="classic">经典</option>
                                <option value="wood">木纹</option>
                                <option value="modern">现代</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="forbidden-toggle">禁手规则</label>
                            <div class="toggle">
                                <input type="checkbox" id="forbidden-toggle">
                                <span class="toggle-slider"></span>
                            </div>
                        </div>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <div id="result-modal" class="result-modal hidden">
        <div class="modal-content">
            <h2 id="result-message"></h2>
            <p id="result-steps"></p>
            <div class="modal-buttons">
                <button id="play-again-btn" type="button">再来一局</button>
                <button id="close-modal-btn" type="button">关闭</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
