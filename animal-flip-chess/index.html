<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="动物翻翻棋是一款适合移动端游玩的 4x4 动物棋翻牌对战小游戏。">
    <title>动物翻翻棋 - 游戏平台</title>
    <link rel="stylesheet" href="style.css?v=20260612-2">
</head>
<body>
    <main class="game-shell" aria-label="动物翻翻棋">
        <header class="game-header">
            <div>
                <p class="eyebrow">Animal Chess</p>
                <h1>动物翻翻棋</h1>
            </div>
            <button id="restart-btn" class="restart-btn" type="button" aria-label="重新开始">↻</button>
        </header>

        <section class="player-info" aria-label="玩家信息">
            <article class="player-card player-a" id="player-a-info">
                <span class="player-label">玩家 A</span>
                <span class="player-pieces" id="player-a-count">8</span>
            </article>
            <div class="turn-indicator" id="turn-indicator">
                <span id="turn-text">翻牌阶段</span>
            </div>
            <article class="player-card player-b" id="player-b-info">
                <span class="player-label">电脑</span>
                <span class="player-pieces" id="player-b-count">8</span>
            </article>
        </section>

        <section class="board-section" aria-label="游戏棋盘">
            <div id="board" class="game-board"></div>
        </section>

        <p class="hint-text">点击翻牌或移动棋子，大吃小，鼠吃象。</p>
    </main>

    <!-- 游戏结果弹窗 -->
    <section id="result-modal" class="modal" hidden aria-label="游戏结果">
        <div class="modal-card" role="dialog" aria-modal="true">
            <p class="eyebrow">Game Over</p>
            <h2 id="result-title">游戏结束</h2>
            <p id="result-desc" class="result-desc"></p>
            <div class="result-grid">
                <div>
                    <span class="label">你</span>
                    <strong id="result-a">0</strong>
                </div>
                <div>
                    <span class="label">电脑</span>
                    <strong id="result-b">0</strong>
                </div>
            </div>
            <button id="play-again-btn" class="primary-btn" type="button">再来一局</button>
        </div>
    </section>

    <script src="script.js?v=20260612-2"></script>
</body>
</html>
