# 设计与组件规则的唯一事实来源。
# 该文件面向人和 AI 共同使用：可读、可解析、非可执行、易于比对。
# 技术栈：HTML5 + Bootstrap 5 + Bootstrap Icons + Chart.js + Vanilla JS

meta:
  name: "企业级应用设计系统（纯 HTML 版）"
  version: "1.0.0"
  status: "启用中"
  owners:
    - "design"
    - "frontend"
  tech_stack:
    styling: "Bootstrap 5.3（唯一样式框架，通过 CDN 引入）"
    icons: "Bootstrap Icons 1.11（唯一图标库，尺寸 18-24px，通过 CDN 引入）"
    charts: "Chart.js 4.x（唯一图表库，通过 CDN 引入）"
    state_global: "js/store.js（基于 localStorage 的跨页面数据管理）"
    state_local: "原生 JavaScript（组件本地状态）"
  default_ports:
    frontend: 3000 # 本地 HTTP 服务器（VS Code Live Server / python -m http.server）
  cdn_versions:
    bootstrap_css: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    bootstrap_js: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    bootstrap_icons: "https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    chart_js: "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
  usage:
    read_order:
      - "在进行任何 UI 改动前阅读本文件"
      - "然后查看 css/variables.css 中 CSS 变量定义"
      - "然后再查看现有页面与组件实现"
    principles:
      - "优先复用，而不是重新发明"
      - "优先使用 Bootstrap 工具类和组件，而不是自定义 CSS"
      - "优先使用 js/components.js 中已有组件，而不是自行实现"
      - "图表颜色统一来自本文件 token 定义，不在页面层硬编码"

product:
  style_keywords:
    - "专业"
    - "清晰"
    - "可信"
    - "高效"
    - "现代"
  ui_goal:
    - "企业后台界面优先保证清晰度与信息密度平衡"
    - "移动端界面需要保证触控舒适"
    - "状态和反馈必须让用户一眼看懂"
    - "数据可视化图表风格统一、专业"

# ============================================================
# 颜色 Token
# 对应 css/variables.css 中的 CSS 变量定义
# 使用方式：CSS 变量 var(--app-primary) 或 Bootstrap 自定义类
# ============================================================
tokens:
  colors:
    # 主品牌色 - 企业蓝
    primary:
      50: "#EEF4FF"
      100: "#E0EBFF"
      200: "#B3D9FF"
      300: "#80C1FF"
      400: "#4DA8FF"
      500: "#1A90FF" # 主色，用于主按钮、链接、激活态
      600: "#0078E0" # hover 态
      700: "#0052CC" # active 态
      800: "#003DA5"
      900: "#002880"

    # 成功色 - 企业绿
    success:
      50: "#F0FDF4"
      100: "#E6FBEE"
      200: "#BFFCE0"
      300: "#8FF7D0"
      400: "#5AE9BA"
      500: "#10B981" # 主成功色
      600: "#059669"
      700: "#047857"
      800: "#065F46"
      900: "#064E3B"

    # 警告色 - 企业橙
    warning:
      50: "#FEF3C7"
      100: "#FEE8B6"
      200: "#FDD48F"
      300: "#FBC15E"
      400: "#F9A825"
      500: "#F59E0B" # 主警告色
      600: "#D97706"
      700: "#B45309"
      800: "#92400E"
      900: "#78350F"

    # 错误色 - 企业红
    error:
      50: "#FEF2F2"
      100: "#FEE2E2"
      200: "#FECACA"
      300: "#FCA5A5"
      400: "#F87171"
      500: "#EF4444" # 主错误色
      600: "#DC2626"
      700: "#B91C1C"
      800: "#991B1B"
      900: "#7F1D1D"

    # 信息色
    info:
      50: "#EFF6FF"
      100: "#DBEAFE"
      500: "#1A90FF"
      600: "#0078E0"

    # 中性色 - 灰度系
    gray:
      50: "#FAFBFC"
      100: "#F3F4F6"
      150: "#EBEEF2"
      200: "#E5E7EB"
      300: "#D1D5DB"
      400: "#9CA3AF"
      500: "#6B7280"
      600: "#4B5563"
      700: "#374151"
      800: "#1F2937"
      900: "#111827"

  # ============================================================
  # 语义化颜色映射（优先使用语义名，而非具体色阶）
  # ============================================================
  semantic:
    text:
      primary: "var(--app-gray-900)" # 主文本
      secondary: "var(--app-gray-500)" # 次要文本
      disabled: "var(--app-gray-400)" # 禁用文本
      inverse: "#FFFFFF" # 反色文本（深色背景上）
      link: "var(--app-primary)" # 链接
      link_hover: "var(--app-primary-hover)"
    background:
      page: "var(--app-gray-50)" # 页面背景
      container: "#FFFFFF" # 卡片/面板背景
      subtle: "var(--app-gray-100)" # 次级区块背景
      active: "var(--app-primary-light)" # 激活/选中背景
    border:
      default: "var(--app-gray-200)" # 默认边框
      strong: "var(--app-gray-300)" # 强调边框
      focus: "var(--app-primary)" # 焦点边框
    status:
      success_bg: "var(--app-success-light)"
      success_text: "var(--app-success-dark)"
      warning_bg: "var(--app-warning-light)"
      warning_text: "var(--app-warning-dark)"
      error_bg: "var(--app-error-light)"
      error_text: "var(--app-error-dark)"
      info_bg: "var(--app-info-light)"
      info_text: "var(--app-info-dark)"

  typography:
    font_family:
      sans: "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      mono: "'SF Mono', 'Monaco', 'Consolas', monospace"
    font_size:
      xs: "12px"
      sm: "14px" # 表格、辅助信息
      base: "16px" # 正文
      md: "15px"
      lg: "18px" # 小标题
      xl: "20px" # 标题
      2xl: "24px" # 页面标题
      3xl: "30px" # 大数字展示
    font_weight:
      normal: 400
      medium: 500
      semibold: 600
      bold: 700
    line_height:
      tight: 1.2
      normal: 1.5
      relaxed: 1.75

  spacing:
    base_unit: "4px"
    scale:
      0.5: "2px"
      1: "4px"
      1.5: "6px"
      2: "8px"
      2.5: "10px"
      3: "12px"
      3.5: "14px"
      4: "16px"
      5: "20px"
      6: "24px"
      7: "28px"
      8: "32px"
      10: "40px"
      12: "48px"
      14: "56px"
      16: "64px"

  radius:
    none: "0"
    xs: "2px"
    sm: "4px"
    md: "6px"
    lg: "8px" # 标准
    xl: "12px"
    2xl: "16px"
    full: "9999px"

  shadow:
    none: "none"
    xs: "0 1px 2px 0 rgba(0,0,0,0.04)"
    sm: "0 1px 3px 0 rgba(0,0,0,0.08)"
    md: "0 4px 8px -2px rgba(0,0,0,0.10), 0 2px 4px -2px rgba(0,0,0,0.06)"
    lg: "0 10px 15px -3px rgba(0,0,0,0.10), 0 4px 6px -2px rgba(0,0,0,0.05)"
    xl: "0 20px 25px -5px rgba(0,0,0,0.10), 0 10px 10px -5px rgba(0,0,0,0.04)"

  transitions:
    fast: "100ms"
    base: "200ms" # 标准
    slow: "300ms"
    slower: "500ms"

  breakpoints:
    # 使用 Bootstrap 5 断点
    xs: "0"
    sm: "576px"
    md: "768px"
    lg: "992px"
    xl: "1200px"
    xxl: "1400px"

# ============================================================
# Chart.js 图表主题配置
# 所有图表颜色、字体、网格、tooltip 均来自此配置
# ============================================================
chartjs:
  color_palette:
    - "#1A90FF" # 主蓝（primary-500）
    - "#10B981" # 主绿（success-500）
    - "#F59E0B" # 主橙（warning-500）
    - "#EF4444" # 主红（error-500）
    - "#8B5CF6" # 紫
    - "#EC4899" # 粉
    - "#06B6D4" # 青
    - "#F97316" # 橙红
  grid:
    color: "#E5E7EB" # gray-200
    label_color: "#6B7280" # gray-500
    border_color: "#D1D5DB" # gray-300
  tooltip:
    bg: "#FFFFFF"
    border: "#E5E7EB"
    text: "#374151" # gray-700
  legend:
    text_color: "#4B5563" # gray-600
  font_family: "ui-sans-serif, system-ui, -apple-system, sans-serif"
  font_size:
    axis_label: 12
    tooltip: 13
    legend: 13
    title: 14
  usage_rules:
    - "所有图表通过 js/components.js 中封装的组件使用"
    - "图表颜色统一引用本文件 color_palette，禁止在 option 中硬编码颜色"
    - "图表容器必须设置明确的高度"
    - "图表组件必须处理 loading 和 empty 状态"
    - "tooltip、legend、axis 样式统一来自主题，不单独覆盖"
    - "图表实例在页面卸载时必须调用 chart.destroy()"

# ============================================================
# Bootstrap 配置映射
# Bootstrap 工具类与 token 的对应关系
# ============================================================
bootstrap:
  # 自定义 CSS 变量映射到 Bootstrap 的方式
  extend_colors:
    primary: "tokens.colors.primary（50-900）"
    success: "tokens.colors.success（50-900）"
    warning: "tokens.colors.warning（50-900）"
    danger: "tokens.colors.error（50-900）"
    info: "tokens.colors.info"
  usage_rules:
    - "使用 Bootstrap 工具类：text-primary、bg-success、border-danger 等"
    - "自定义颜色使用 CSS 变量：color: var(--app-primary)"
    - "禁止使用 style 属性硬编码颜色"
    - "间距使用 Bootstrap 工具类：p-3、m-2、gap-2、px-4 等"
    - "响应式遵循 Bootstrap 断点：基于 Bootstrap 的 col 系统"
    - "优先使用 Bootstrap 组件（Modal、Accordion、Card、Table 等）"

# ============================================================
# 状态管理规范
# ============================================================
state_management:
  local_state:
    tool: "原生 JavaScript（let/const、addEventListener、DOM 操作）"
    use_for:
      - "表单输入值"
      - "弹窗开关"
      - "单个组件的 loading/error 状态"
      - "本地筛选、排序、分页"
  global_state:
    tool: "js/store.js（基于 localStorage 封装）"
    store_location: "js/store.js"
    use_for:
      - "当前登录用户信息"
      - "权限与角色"
      - "侧边菜单折叠状态"
      - "业务数据（用户、患者、订单等 CRUD 数据）"
    storage_prefix: "app_"
    forbidden:
      - "直接使用 localStorage API"
      - "在页面脚本中直接调用 localStorage.getItem / setItem"
      - "使用 cookie / sessionStorage 存储业务数据"

# ============================================================
# 页面状态规范
# ============================================================
page_states:
  required:
    - "loading"
    - "empty"
    - "error"
    - "no-permission"
  guidance:
    loading:
      description: "数据加载中"
      implementation: "列表/表格用 Bootstrap placeholder 组件（骨架屏效果），按钮操作用 disabled + spinner"
      bootstrap_example: '<div class="placeholder col-12"></div>'
    empty:
      description: "无数据"
      implementation: "展示空状态图标 + 简短说明 + 引导操作按钮"
    error:
      description: "操作失败"
      implementation: "展示可读的错误原因，提供重试按钮"
    no_permission:
      description: "权限不足"
      implementation: "明确说明权限不足，不暴露内部实现细节"

# ============================================================
# 组件使用规则
# ============================================================
component_rules:
  reuse_first: true
  naming:
    components: "PascalCase（JS 中的组件函数/类）"
    utils: "camelCase"
    data_files: "kebab-case"
  custom_component_policy:
    - "只有在确实存在复用价值时才新增共享组件"
    - "避免为了单次需求做过度抽象"
    - "组件职责保持单一"
  categories:
    layout:
      description: "布局组件"
      location: "components/layout/"
      examples:
        - "Sidebar（侧边栏导航，支持折叠）"
        - "Header（顶部栏，用户信息、通知）"
        - "Footer（底部栏）"
        - "PageContainer（页面容器，统一 padding）"
    ui:
      description: "基础 UI 组件"
      location: "js/components.js"
      examples:
        - "Button（主/次/幽灵/危险变体，使用 Bootstrap 按钮类）"
        - "Badge（状态标签，使用 Bootstrap badge 类）"
        - "StatCard（数据统计卡片）"
        - "StatusTag（业务状态标签）"
        - "SearchBar（搜索栏）"
        - "FilterBar（筛选栏）"
        - "Modal（弹窗，使用 Bootstrap Modal 组件）"
        - "Toast（轻提示，封装 Bootstrap Toast 组件）"
        - "Confirm（确认对话框，基于 Bootstrap Modal 封装）"
        - "Table（数据表格，支持排序、搜索、分页）"
        - "Pagination（分页）"
    charts:
      description: "Chart.js 封装图表组件"
      location: "js/components.js"
      examples:
        - "BarChartCard（柱状图卡片）"
        - "LineChartCard（折线图卡片）"
        - "PieChartCard（饼图卡片）"
      rules:
        - "统一封装 loading、empty、error 状态"
        - "颜色通过本文件 color_palette 注入"
        - "容器必须设置明确高度"

# ============================================================
# 表单规范
# ============================================================
form_rules:
  layout:
    label_position: "标签在输入框上方（top），企业表单标准布局"
    label_style: "form-label，text-sm font-medium"
    required_mark: "标签后紧跟红色星号 *，使用 text-danger"
    helper_text: "form-text，text-muted"
    error_text: "invalid-feedback"
    field_gap: "mb-3（垂直间距）"
    section_gap: "mb-4（分组间距）"
  sizes:
    sm:
      height: "form-control-sm"
      description: "紧凑型，用于筛选栏、内联表单"
    md:
      height: "form-control" # 默认
      description: "默认尺寸，企业表单标准"
    lg:
      height: "form-control-lg"
      description: "宽松型，用于登录、注册等关键表单"
  validation:
    trigger: "失焦校验为主，提交时全量校验"
    error_border: "is-invalid（Bootstrap 验证类）"
    success_border: "is-valid"
  submit_behavior:
    loading_state: "提交按钮 disabled + spinner-border，防止重复提交"
    reset_policy: "提交成功后根据业务场景决定是否重置，不强制"

# ============================================================
# Bootstrap 组件使用规范
# ============================================================
bootstrap_components:
  modal:
    description: "弹窗，用于需要用户聚焦处理的操作"
    sizes:
      sm: "modal-sm" # 确认框
      md: "modal-default" # 默认，表单弹窗
      lg: "modal-lg" # 复杂表单
      xl: "modal-xl" # 详情查看
    structure:
      overlay: "modal-backdrop"
      container: "modal-dialog modal-dialog-centered"
      header: "modal-header"
      body: "modal-body"
      footer: "modal-footer"
    rules:
      - "弹窗打开时锁定 body 滚动（Bootstrap 默认行为）"
      - "表单弹窗提交按钮须有 loading 态，防止重复提交"
      - "危险操作（删除/停用）使用 btn-danger 确认按钮"
      - "弹窗层级不超过 2 层，禁止多层嵌套弹窗"
    confirm_variant:
      description: "确认/警告弹窗，图标居中展示"
      icon_danger: "bi-exclamation-triangle-fill text-danger"
      icon_info: "bi-info-circle-fill text-primary"
      icon_success: "bi-check-circle-fill text-success"

  accordion:
    description: "折叠面板，展示/隐藏内容区域"
    variants:
      flush: "无边框，适合嵌入卡片中"
      default: "带边框（默认）"
    rules:
      - "禁止在折叠内容中放置表格等需要固定高度的复杂组件"

  card:
    description: "卡片容器"
    structure:
      container: "card"
      header: "card-header"
      body: "card-body"
      footer: "card-footer"
      title: "card-title"
      subtitle: "card-subtitle"
    rules:
      - "卡片使用 shadow-sm 提升层次感"
      - "卡片圆角统一 rounded-3"

  table:
    description: "数据表格，企业应用核心组件"
    classes:
      responsive: "table-responsive"
      striped: "table-striped" # 偶数行背景色（可选）
      hover: "table-hover"
      bordered: "table-bordered" # 带边框（可选）
    structure:
      thead: "table-light"
      th: "text-start text-uppercase text-secondary fw-semibold"
      td: "align-middle"
    column_types:
      text: "默认 td 样式"
      number: "text-end font-monospace"
      status: "使用 Bootstrap badge 组件"
      action: "text-end，操作按钮组"
      checkbox: "w-1 text-center"
    features:
      sortable:
        icon: "bi-chevron-expand（默认），bi-chevron-up / bi-chevron-down（激活）"
      fixed_column:
        left: "position-sticky start-0 bg-white z-1"
      expandable:
        expand_icon: "bi-chevron-right 过渡到 bi-chevron-down"
    empty_state: "使用自定义空状态组件"
    loading_state: "使用 Bootstrap placeholder 组件"
    rules:
      - "操作列固定在最右侧"
      - "表格必须处理 loading、empty、error 三种状态"
      - "超长文本使用 text-truncate 截断，配合 title 属性展示完整内容"

  toast:
    description: "轻提示，操作结果反馈"
    structure:
      container: "toast-container position-fixed top-0 end-0 p-3"
      toast: "toast align-items-center"
      icon: "me-2"
      body: "toast-body d-flex align-items-center"
      close: "btn-close ms-auto"
    variants:
      success: "text-bg-success，bi-check-circle-fill"
      error: "text-bg-danger，bi-exclamation-circle-fill"
      warning: "text-bg-warning，bi-exclamation-triangle-fill"
      info: "text-bg-info，bi-info-circle-fill"
    position: "右上角（默认）"
    duration:
      default: "3000ms 自动关闭"
      error: "5000ms"
      persistent: "不自动关闭"
    rules:
      - "成功操作使用 success，失败使用 error，不混用"
      - "文案简洁，15 字以内"
      - "同一时间最多显示 5 条"

  badge:
    description: "状态标签，用于状态指示"
    variants:
      primary: "bg-primary"
      success: "bg-success"
      warning: "bg-warning text-dark"
      danger: "bg-danger"
      info: "bg-info"
      secondary: "bg-secondary"
    sizes:
      default: "badge"
      pill: "rounded-pill"
    rules:
      - "Badge 用于状态指示（在线/离线/审批中），Tag 用于内容标记（技能标签/筛选条件）"

  tabs:
    description: "标签页"
    structure:
      nav: "nav nav-tabs"
      active: "nav-link active"
      content: "tab-content"
      pane: "tab-pane fade show active"
    variants:
      line: "nav-tabs（默认，下划线型）"
      pill: "nav-pills（胶囊型）"
    rules:
      - "Tab 切换不重新加载数据（数据已缓存），切换即时响应"
      - "禁止超过 8 个 Tab，超出考虑用 Select 代替"

  breadcrumb:
    description: "面包屑导航"
    structure: "breadcrumb"
    items: "breadcrumb-item"
    active: "breadcrumb-item active"
    separator: "/"（Bootstrap 默认分隔符）
    rules:
      - "最后一项（当前页）不可点击"
      - "面包屑文字与页面标题保持一致"

  offcanvas:
    description: "抽屉面板，从边缘滑出"
    variants:
      start: "从左侧滑入"
      end: "从右侧滑入（默认）"
      bottom: "从底部滑入（移动端适用）"
    sizes:
      sm: "offcanvas-sm" # 需自定义
      md: "" # 默认
      lg: "offcanvas-lg" # 需自定义
    rules:
      - "详情查看/编辑用 offcanvas，需用户聚焦决策用 modal"
      - "移动端优先使用 bottom offcanvas"

  spinner:
    description: "加载中指示器"
    variants:
      border: "spinner-border"
      grow: "spinner-grow"
    sizes:
      sm: "spinner-border-sm"
      md: "" # 默认
    usage:
      inline: "嵌入按钮或内容流中"
      container: "相对定位的父容器内覆盖"
      fullpage: "固定定位覆盖全页"

  placeholder:
    description: "骨架屏，内容加载时的占位动画"
    structure:
      container: "placeholder-glow" 或 "placeholder-wave"
      item: "placeholder col-X"
    variants:
      text_line: "placeholder col-12"
      text_short: "placeholder col-6"
      title: "placeholder col-4 mb-3"
      avatar: "placeholder rounded-circle"
      image: "placeholder rounded"
    rules:
      - "骨架屏结构应尽量贴近真实内容布局，避免视觉跳变"
      - "表格 loading 用 placeholder 行替换 tbody，不用全页 spinner 遮罩"

  pagination:
    description: "分页器"
    structure:
      container: "pagination"
      item: "page-item"
      link: "page-link"
    features:
      active: "page-item active"
      disabled: "page-item disabled"
      ellipsis: "page-item disabled"
    page_size_selector: "使用 Bootstrap form-select sm 尺寸"
    total_display: "text-muted text-end"
    layout: "d-flex justify-content-between align-items-center"
    rules:
      - "每页条数变更时重置到第 1 页"
      - "总数为 0 时不展示分页器"

  alert:
    description: "内联提示，嵌入页面内容中的状态说明"
    variants:
      info: "alert-info"
      success: "alert-success"
      warning: "alert-warning"
      danger: "alert-danger"
    structure:
      container: "alert d-flex align-items-center"
      icon: "me-2"
      dismissible: "alert-dismissible"
    rules:
      - "Alert 用于页面级别的持久提示，Toast 用于操作结果的短暂反馈"
      - "不在 Alert 中放置复杂交互元素，最多一个操作链接"

# ============================================================
# 图标规范
# ============================================================
icons:
  library: "Bootstrap Icons 1.11"
  import: "通过 CDN 引入，使用 <i class='bi bi-xxx'></i> 方式"
  sizes:
    default: "font-size: 18px" # 默认
    medium: "font-size: 20px"
    large: "font-size: 24px"
  usage_rules:
    - "统一使用 Bootstrap Icons，禁止自定义 SVG 或其他图标库"
    - "尺寸统一通过 CSS 控制或 style 属性设置"
    - "禁止使用 <img src='icon.svg'> 或 <i class='fa-...'>"
    - "图标颜色通过 Bootstrap 文字颜色类控制（text-primary、text-danger 等）"

# ============================================================
# 响应式设计规范
# ============================================================
responsive:
  principle: "移动优先（Mobile First）"
  breakpoints:
    default: "手机竖屏（< 576px）"
    sm: "576px - 手机横屏"
    md: "768px - 平板"
    lg: "992px - 桌面"
    xl: "1200px - 宽屏"
    xxl: "1400px - 超宽屏"
  common_patterns:
    grid_cols: "row > col-12 col-md-6 col-lg-4"
    padding: "px-3 px-md-4 px-lg-5"
    text_size: "fs-6 fs-md-5 fs-lg-4"
    sidebar: "offcanvas-lg（移动端抽屉，桌面端固定侧边栏）"
    table: "table-responsive（水平滚动）"

# ============================================================
# 动效规范
# ============================================================
animations:
  purpose: "提升用户体验，不用于炫技"
  principles:
    - "动效应该有意义，帮助用户理解界面变化"
    - "动效时长控制在 100ms-300ms"
    - "尊重用户的减少动效偏好设置（prefers-reduced-motion）"
  css_transitions:
    hover: "transition: all 200ms ease"
    focus: "transition: box-shadow 200ms ease, border-color 200ms ease"
    sidebar_collapse: "transition: width 300ms ease-in-out"
  bootstrap_animations:
    modal: "Bootstrap 默认 fade 动画"
    offcanvas: "Bootstrap 默认 slide 动画"
    toast: "Bootstrap 默认 fade + slide 动画"
    collapse: "Bootstrap Collapse 组件动画"
    dropdown: "Bootstrap Dropdown 动画"
  custom_animations:
    fade_in: "@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }"
    slide_up: "@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }"
    pulse: "Bootstrap animate-pulse 或自定义 pulse 动画"

# ============================================================
# Do / Don't 规则
# ============================================================
do:
  - "优先复用现有组件和页面模式"
  - "优先使用 Bootstrap 工具类和组件"
  - "自定义颜色使用 CSS 变量（var(--app-primary)）"
  - "保持完整的页面状态反馈（loading/empty/error/no-permission）"
  - "图表颜色统一来自 design-system.yaml 中的 color_palette"
  - "全局数据管理统一使用 js/store.js"
  - "图标统一使用 Bootstrap Icons，尺寸 18-24px"
  - "响应式遵循 Bootstrap 断点系统"
  - "同时关注桌面端与移动端可读性"
  - "动效时长控制在 100ms-300ms"

dont:
  - "不要使用 style 属性硬编码颜色值（如 style='color: #1A90FF'）"
  - "不要使用 Tailwind CSS、Sass、Less 等 Bootstrap 以外的样式方案"
  - "不要硬编码间距数值（如 style='padding: 20px'）"
  - "不要使用 Chart.js 以外的图表库（ECharts、D3.js、Recharts 等）"
  - "不要使用 React、Vue、Angular、jQuery 等前端框架"
  - "不要使用 Bootstrap Icons 以外的图标库（Font Awesome、Material Icons 等）"
  - "不要使用 npm/yarn/pnpm 等包管理器"
  - "不要在页面脚本中直接操作 localStorage，统一通过 js/store.js"
  - "不要交付缺少 loading、empty、error 状态的页面"
  - "不要再创建新的设计 token 文件或平行配置体系"
  - "不要在没有充分复用价值的情况下创建新共享组件"
  - "不要在 <style> 标签中写页面样式，统一使用 css/custom.css"
  - "不要使用 var 声明变量，统一使用 const/let"
  - "不要使用 == / != 进行比较，统一使用 === / !=="
  - "不要使用 HTML 内联事件属性（onclick、onchange 等）"
  - "不要嵌套超过 2 层弹窗（Modal/Offcanvas）"
  - "不要让 Badge 与 Tag 混用：Badge 表示状态，Tag 表示内容标记"
  - "不要超过 8 个 Tab，超出用 Select 代替"
  - "不要在侧边导航菜单中嵌套超过 2 层菜单"
  - "不要在表格/列表数据加载时使用全页 spinner 遮罩，应使用 placeholder 骨架屏"
