<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫冒险</title>
    <link rel="stylesheet" href="../css/custom.css">
    <style>
        :root {
            --maze-page: #eff3f8;
            --maze-panel: #ffffff;
            --maze-panel-muted: #f6f8fb;
            --maze-stage: #f9fbff;
            --maze-border: #d7deea;
            --maze-border-strong: #b8c4d8;
            --maze-text: #172033;
            --maze-muted: #5d6880;
            --maze-primary: #2957c8;
            --maze-primary-soft: #e8efff;
            --maze-success: #2f9e44;
            --maze-success-soft: #eaf7ef;
            --maze-warning: #f59e0b;
            --maze-warning-soft: #fff7e6;
            --maze-wall: #284262;
            --maze-path: #fffdf7;
            --maze-visited: #dff3eb;
            --shadow: 0 18px 40px rgba(31, 50, 81, 0.12);
            --shadow-soft: 0 10px 24px rgba(31, 50, 81, 0.08);
            --r-xl: 24px;
            --r-lg: 16px;
            --r-md: 12px;
        }

        * { box-sizing: border-box; }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--maze-text);
            background:
                linear-gradient(180deg, #f7f9fc 0%, var(--maze-page) 100%);
            touch-action: manipulation;
        }

        button { font: inherit; border: 0; cursor: pointer; }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--maze-stage);
            box-shadow: inset 0 0 0 1px rgba(215, 222, 234, 0.72);
        }

        #game-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(184, 196, 216, 0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184, 196, 216, 0.18) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: linear-gradient(90deg, transparent 0, #000 18%, #000 100%);
        }

        #game-sidebar {
            position: fixed;
            top: 18px;
            left: 18px;
            bottom: 18px;
            z-index: 120;
            width: 318px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            pointer-events: auto;
        }

        #maze-container {
            position: absolute;
            transition: transform 0.12s linear;
            transform-origin: top left;
            will-change: transform;
            contain: layout style paint;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .cell {
            position: absolute;
            border-radius: 5px;
            transition: background-color 0.16s ease, box-shadow 0.16s ease;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .wall {
            background: linear-gradient(145deg, var(--maze-wall), #1f334d);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), inset 0 0 8px rgba(23, 32, 51, 0.18);
        }

        .path {
            background: linear-gradient(145deg, var(--maze-path), #f0eadb);
            box-shadow: inset 0 0 0 1px rgba(180, 141, 87, 0.05);
        }

        .visited {
            background: linear-gradient(145deg, var(--maze-visited), #cceadd);
            box-shadow: inset 0 0 0 1px rgba(47, 158, 68, 0.12);
        }

        .void {
            background: #dfe6f0;
            box-shadow: inset 0 0 0 1px rgba(184, 196, 216, 0.3);
        }

        .end {
            background: linear-gradient(145deg, rgba(255, 190, 102, 0.96), rgba(255, 120, 94, 0.92));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4), 0 0 22px rgba(255, 140, 102, 0.38);
            animation: beacon 1.8s ease-in-out infinite;
        }

        #player,
        #partner {
            position: absolute;
            left: 0;
            top: 0;
            width: 90%;
            height: 90%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        #player {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ffd166"/><circle cx="35" cy="40" r="5" fill="%23000"/><circle cx="65" cy="40" r="5" fill="%23000"/><path d="M34 68 Q50 82 66 68" stroke="%23000" stroke-width="5" fill="none"/></svg>');
            filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.34));
            transition: transform 0.1s linear;
        }

        #partner {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ff9fb2"/><circle cx="35" cy="40" r="5" fill="%23000"/><circle cx="65" cy="40" r="5" fill="%23000"/><path d="M34 68 Q50 82 66 68" stroke="%23000" stroke-width="5" fill="none"/></svg>');
            display: none;
            filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.34));
        }

        #hud {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(215, 222, 234, 0.9);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .hud-copy { max-width: none; }

        #hud-stats-panel {
            width: 100%;
        }

        .hud-kicker,
        .stat-label,
        .difficulty-tag {
            margin: 0;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--maze-muted);
        }

        .hud-copy h1 {
            margin: 4px 0 0;
            font-size: clamp(25px, 2.5vw, 34px);
            line-height: 1.1;
        }

        .hud-copy p:last-child {
            margin: 0;
            font-size: 13px;
            line-height: 1.55;
            color: var(--maze-muted);
        }

        .hud-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-card {
            min-height: 74px;
            padding: 12px 13px;
            border-radius: var(--r-lg);
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(215, 222, 234, 0.9);
            box-shadow: var(--shadow-soft);
        }

        .stat-value {
            display: block;
            margin-top: 5px;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.25;
            color: var(--maze-text);
            word-break: break-word;
        }

        #level-select,
        #message-overlay,
        #unsupported-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(23, 32, 51, 0.34);
            backdrop-filter: blur(10px);
        }

        #message-overlay.hidden { display: none; }
        #unsupported-overlay.hidden { display: none; }

        .overlay-card {
            width: min(100%, 1040px);
            padding: 28px;
            border-radius: var(--r-xl);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(215, 222, 234, 0.96);
            box-shadow: 0 30px 70px rgba(31, 50, 81, 0.22);
        }

        .overlay-card h2 {
            margin: 10px 0 12px;
            font-size: clamp(30px, 4vw, 46px);
        }

        .overlay-card > p {
            margin: 0;
            max-width: 720px;
            color: var(--maze-muted);
            line-height: 1.7;
            font-size: 16px;
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .difficulty-card {
            padding: 20px;
            text-align: left;
            color: var(--maze-text);
            border-radius: var(--r-lg);
            background: var(--maze-panel-muted);
            border: 1px solid rgba(215, 222, 234, 0.9);
            transition: transform 0.22s ease, border-color 0.22s ease, background-color 0.22s ease, box-shadow 0.22s ease;
        }

        .difficulty-card:hover {
            transform: translateY(-3px);
            border-color: rgba(41, 87, 200, 0.28);
            background: #ffffff;
            box-shadow: 0 16px 30px rgba(41, 87, 200, 0.14);
        }

        .difficulty-card h3 {
            margin: 10px 0 8px;
            font-size: 24px;
        }

        .difficulty-card p {
            margin: 0;
            color: var(--maze-muted);
            line-height: 1.65;
        }

        .difficulty-highlight {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            background: var(--maze-primary-soft);
            color: var(--maze-primary);
            font-size: 13px;
            font-weight: 700;
        }

        .message-card {
            width: min(100%, 420px);
            text-align: center;
        }

        .message-card h3 {
            margin: 10px 0 12px;
            font-size: 30px;
        }

        .message-card p {
            margin: 0;
            color: var(--maze-muted);
            line-height: 1.7;
        }

        .primary-btn {
            margin-top: 22px;
            min-height: 50px;
            padding: 0 22px;
            border-radius: 999px;
            background: var(--maze-primary);
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            box-shadow: 0 14px 28px rgba(41, 87, 200, 0.2);
        }

        #mobile-controls {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            display: none;
            z-index: 120;
            touch-action: none;
        }

        .pad-shell,
        .zoom-stack {
            padding: 10px 12px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(215, 222, 234, 0.9);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .control-row {
            display: flex;
            justify-content: center;
            margin: 4px 0;
        }

        .control-row.horizontal { gap: 54px; }

        .control-btn,
        .zoom-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .control-btn {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: var(--maze-primary);
            color: #ffffff;
            font-size: 26px;
            box-shadow: 0 12px 24px rgba(41, 87, 200, 0.24);
        }

        .zoom-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--maze-primary-soft);
            color: var(--maze-primary);
            font-size: 22px;
            font-weight: 700;
        }

        .control-btn:active,
        .zoom-btn:active { transform: scale(0.96); }

        #zoom-controls {
            position: fixed;
            right: 20px;
            bottom: 32px;
            display: none;
            z-index: 120;
        }

        .zoom-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @keyframes beacon {
            0%,
            100% {
                transform: scale(1);
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4), 0 0 18px rgba(255, 140, 102, 0.24);
            }

            50% {
                transform: scale(1.04);
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55), 0 0 28px rgba(255, 140, 102, 0.46);
            }
        }

        @media (max-width: 1100px) {
            #game-sidebar { width: 286px; }
            .hud-stats { grid-template-columns: 1fr; }
        }

        @media (max-width: 900px) {
            #game-sidebar {
                left: 14px;
                right: 14px;
                top: 14px;
                bottom: auto;
                width: auto;
            }

            #hud {
                padding: 14px 16px;
                border-radius: 20px;
            }

            .hud-stats {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }

            .stat-card {
                min-height: 58px;
                padding: 9px 10px;
            }

            .stat-value { font-size: 13px; }
        }

        @media (max-width: 720px) {
            #maze-container { transition: none; }

            .cell { border-radius: 3px; }

            .wall {
                box-shadow: inset 0 0 0 1px rgba(145, 169, 218, 0.06);
            }

            .end {
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32), 0 0 14px rgba(255, 140, 102, 0.28);
            }

            #player,
            #partner {
                filter: none;
            }

            #player { transition: none; }

            .hud-copy h1 { font-size: 24px; }
            .hud-copy p:last-child { font-size: 12px; }
            .hud-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .overlay-card { padding: 22px; border-radius: 24px; }
            .difficulty-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside id="game-sidebar">
        <section id="hud">
            <div class="hud-copy">
                <p class="hud-kicker">迷宫冒险</p>
                <h1>穿过迷宫，找到伙伴</h1>
                <p id="goal-text">选择难度后开始挑战。每通关一关，迷宫会更大、更紧凑，也更考验路线判断。</p>
            </div>
        </section>

        <aside id="hud-stats-panel" class="hud-stats">
            <div class="stat-card"><p class="stat-label">关卡</p><span class="stat-value" id="level">1</span></div>
            <div class="stat-card"><p class="stat-label">步数</p><span class="stat-value" id="steps">0</span></div>
            <div class="stat-card"><p class="stat-label">耗时</p><span class="stat-value" id="timer">0秒</span></div>
            <div class="stat-card"><p class="stat-label">尺寸</p><span class="stat-value" id="maze-size">--</span></div>
            <div class="stat-card"><p class="stat-label">模式</p><span class="stat-value" id="difficulty-name">未开始</span></div>
        </aside>
    </aside>

    <div id="game-container"><div id="maze-container"></div></div>

    <section id="level-select">
        <div class="overlay-card">
            <p class="difficulty-tag">难度选择</p>
            <h2>迷宫冒险</h2>
            <p>不同难度不只是入口尺寸不同，后续每一关都会继续扩张迷宫规模。越高难度，棋盘越大、单格越小，移动和观察都会更吃力。</p>
            <div class="difficulty-grid">
                <button type="button" class="difficulty-card" data-difficulty="easy">
                    <span class="difficulty-highlight">轻探模式</span>
                    <h3>简单</h3>
                    <p>13×13 起步，适合熟悉玩法。每一关迷宫都会继续增长，后续也需要认真找路。</p>
                </button>
                <button type="button" class="difficulty-card" data-difficulty="medium">
                    <span class="difficulty-highlight">追踪模式</span>
                    <h3>中等</h3>
                    <p>19×19 起步，转角更多、回溯成本更高，适合想要稳定挑战的玩家。</p>
                </button>
                <button type="button" class="difficulty-card" data-difficulty="hard">
                    <span class="difficulty-highlight">深渊模式</span>
                    <h3>困难</h3>
                    <p>27×27 起步，视野更紧、路线更长。通关后增长也更明显，真正考验方向感。</p>
                </button>
            </div>
        </div>
    </section>

    <section id="message-overlay" class="hidden">
        <div class="overlay-card message-card">
            <p class="difficulty-tag">通关完成</p>
            <h3 id="message-title">找到伙伴了</h3>
            <p id="message-text">准备进入下一关。</p>
            <button type="button" class="primary-btn" id="next-level-btn">进入下一关</button>
        </div>
    </section>

    <section id="unsupported-overlay" class="hidden">
        <div class="overlay-card message-card">
            <p class="difficulty-tag">桌面端专用</p>
            <h3>迷宫冒险暂不支持移动端</h3>
            <p>这个游戏已经切换为桌面端游玩模式。请在电脑浏览器中打开，以获得完整迷宫视野和稳定操作体验。</p>
        </div>
    </section>

    <section id="mobile-controls">
        <div class="pad-shell">
            <div class="control-row"><button type="button" class="control-btn" id="up">↑</button></div>
            <div class="control-row horizontal">
                <button type="button" class="control-btn" id="left">←</button>
                <button type="button" class="control-btn" id="right">→</button>
            </div>
            <div class="control-row"><button type="button" class="control-btn" id="down">↓</button></div>
        </div>
    </section>

    <section id="zoom-controls">
        <div class="zoom-stack">
            <button type="button" class="zoom-btn" id="zoom-in">+</button>
            <button type="button" class="zoom-btn" id="zoom-out">−</button>
        </div>
    </section>

    <script>
        const config = {
            easy: { label: '简单', baseSize: 13, sizeStep: 2, baseCellSize: 40, cellShrinkEvery: 3, cellShrinkStep: 1, minCellSize: 28 },
            medium: { label: '中等', baseSize: 19, sizeStep: 2, baseCellSize: 34, cellShrinkEvery: 2, cellShrinkStep: 1, minCellSize: 22 },
            hard: { label: '困难', baseSize: 27, sizeStep: 2, baseCellSize: 28, cellShrinkEvery: 2, cellShrinkStep: 1, minCellSize: 16 }
        };

        const gameState = {
            level: 1,
            steps: 0,
            startTime: 0,
            elapsedTime: 0,
            timerInterval: null,
            difficulty: null,
            maze: null,
            playerPosition: { x: 0, y: 0 },
            partnerPosition: { x: 0, y: 0 },
            partnerFound: false,
            zoomLevel: 1,
            isMobile: false,
            translateX: 0,
            translateY: 0,
            visitedCells: new Set(),
            playerElement: null,
            partnerElement: null,
            safeArea: { top: 18, right: 18, bottom: 18, left: 18 },
            focusFrame: 0,
            mobileViewportRadius: 4
        };

        const gameContainer = document.getElementById('game-container');
        const gameSidebar = document.getElementById('game-sidebar');
        const mazeContainer = document.getElementById('maze-container');
        const hud = document.getElementById('hud');
        const statsPanel = document.getElementById('hud-stats-panel');
        const levelSelect = document.getElementById('level-select');
        const levelDisplay = document.getElementById('level');
        const stepsDisplay = document.getElementById('steps');
        const timerDisplay = document.getElementById('timer');
        const mazeSizeDisplay = document.getElementById('maze-size');
        const difficultyDisplay = document.getElementById('difficulty-name');
        const goalText = document.getElementById('goal-text');
        const mobileControls = document.getElementById('mobile-controls');
        const zoomControls = document.getElementById('zoom-controls');
        const messageOverlay = document.getElementById('message-overlay');
        const unsupportedOverlay = document.getElementById('unsupported-overlay');
        const messageTitle = document.getElementById('message-title');
        const messageText = document.getElementById('message-text');
        const nextLevelButton = document.getElementById('next-level-btn');

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function bindMobileButton(id, handler) {
            const button = document.getElementById(id);
            const pressEvent = window.PointerEvent ? 'pointerdown' : 'touchstart';

            button.addEventListener(pressEvent, (event) => {
                event.preventDefault();
                handler();
                button.blur();
                window.scrollTo(0, 0);
            }, { passive: false });

            button.addEventListener('click', (event) => event.preventDefault());
        }

        function showUnsupportedState() {
            gameContainer.style.display = 'none';
            gameSidebar.style.display = 'none';
            hud.style.display = 'none';
            statsPanel.style.display = 'none';
            levelSelect.style.display = 'none';
            messageOverlay.classList.add('hidden');
            mobileControls.style.display = 'none';
            zoomControls.style.display = 'none';
            unsupportedOverlay.classList.remove('hidden');
        }

        function keyOf(x, y) {
            return `${x},${y}`;
        }

        function getCurrentConfig() {
            const difficulty = config[gameState.difficulty];
            const levelOffset = Math.max(0, gameState.level - 1);
            const size = difficulty.baseSize + levelOffset * difficulty.sizeStep;
            const shrink = Math.floor(levelOffset / difficulty.cellShrinkEvery) * difficulty.cellShrinkStep;

            return {
                width: size,
                height: size,
                cellSize: Math.max(difficulty.minCellSize, difficulty.baseCellSize - shrink),
                label: difficulty.label
            };
        }

        function updateHud() {
            levelDisplay.textContent = gameState.level;
            stepsDisplay.textContent = gameState.steps;
            timerDisplay.textContent = `${gameState.elapsedTime}秒`;

            if (!gameState.difficulty) {
                mazeSizeDisplay.textContent = '--';
                difficultyDisplay.textContent = '未开始';
                return;
            }

            const current = getCurrentConfig();
            mazeSizeDisplay.textContent = `${current.width}×${current.height}`;
            difficultyDisplay.textContent = current.label;
        }

        function setMissionText(text) {
            goalText.textContent = text;

            if (levelSelect.style.display === 'none') {
                refreshViewportMetrics();
                scheduleFocusOnPlayer();
            }
        }

        function hideMessageOverlay() {
            messageOverlay.classList.add('hidden');
        }

        function showMessageOverlay(title, text, buttonText) {
            messageTitle.textContent = title;
            messageText.textContent = text;
            nextLevelButton.textContent = buttonText;
            messageOverlay.classList.remove('hidden');
        }

        const mazeSupported = !isMobileDevice();
        gameState.isMobile = false;

        if (!mazeSupported) {
            showUnsupportedState();
        }

        function zoomIn() {
            if (!mazeSupported) {
                return;
            }

            if (gameState.zoomLevel < 2) {
                gameState.zoomLevel += 0.2;
                applyZoom();
            }
        }

        function zoomOut() {
            if (!mazeSupported) {
                return;
            }

            if (gameState.zoomLevel > 0.5) {
                gameState.zoomLevel -= 0.2;
                applyZoom();
            }
        }

        function applyZoom() {
            scheduleFocusOnPlayer();
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function roundToDevicePixel(value) {
            const ratio = window.devicePixelRatio || 1;
            return Math.round(value * ratio) / ratio;
        }

        function isMobileViewportMode() {
            return gameState.isMobile;
        }

        function applyMazeTransform() {
            mazeContainer.style.transform = `translate3d(${gameState.translateX}px, ${gameState.translateY}px, 0) scale(${gameState.zoomLevel})`;
        }

        function setActorPosition(element, x, y, cellSize) {
            if (!element) {
                return;
            }

            const offset = cellSize * 0.05;
            const nextX = roundToDevicePixel(x * cellSize + offset);
            const nextY = roundToDevicePixel(y * cellSize + offset);
            element.style.transform = `translate3d(${nextX}px, ${nextY}px, 0)`;
        }

        function getViewportSafeArea() {
            const narrowLayout = window.innerWidth <= 900;
            const gutter = narrowLayout ? 14 : 18;
            const sidebarRect = gameSidebar.getBoundingClientRect();
            const controlsRect = mobileControls.getBoundingClientRect();

            let top = gutter;
            let right = gutter;
            let bottom = gutter;
            let left = gutter;

            if (sidebarRect.width > 0 && sidebarRect.height > 0) {
                if (narrowLayout) {
                    top = Math.max(top, sidebarRect.bottom + gutter);
                } else {
                    left = Math.max(left, sidebarRect.right + gutter);
                }
            } else {
                const hudRect = hud.getBoundingClientRect();
                if (hudRect.height > 0) {
                    top = Math.max(top, hudRect.bottom + gutter);
                }
            }

            if (gameState.isMobile && mobileControls.offsetParent !== null) {
                bottom = Math.max(bottom, window.innerHeight - controlsRect.top + gutter);
            }

            return { top, right, bottom, left };
        }

        function refreshViewportMetrics() {
            gameState.safeArea = getViewportSafeArea();
        }

        function scheduleFocusOnPlayer() {
            if (gameState.focusFrame) {
                cancelAnimationFrame(gameState.focusFrame);
            }

            gameState.focusFrame = requestAnimationFrame(() => {
                gameState.focusFrame = 0;
                focusOnPlayer();
            });
        }

        function buildCell(cellSize, renderX, renderY, mazeX, mazeY) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.style.width = `${cellSize}px`;
            cell.style.height = `${cellSize}px`;
            cell.style.left = `${renderX * cellSize}px`;
            cell.style.top = `${renderY * cellSize}px`;
            cell.dataset.x = mazeX;
            cell.dataset.y = mazeY;

            if (
                mazeX < 0 ||
                mazeY < 0 ||
                mazeY >= gameState.maze.length ||
                mazeX >= gameState.maze[0].length
            ) {
                cell.classList.add('void');
                return cell;
            }

            if (gameState.maze[mazeY][mazeX] === 1) {
                cell.classList.add('wall');
                return cell;
            }

            cell.classList.add('path');

            if (gameState.visitedCells.has(keyOf(mazeX, mazeY))) {
                cell.classList.add('visited');
            }

            if (mazeX === gameState.partnerPosition.x && mazeY === gameState.partnerPosition.y) {
                cell.classList.add('end');
            }

            return cell;
        }

        document.querySelectorAll('.difficulty-card').forEach((button) => {
            button.addEventListener('click', () => startGame(button.dataset.difficulty));
        });

        nextLevelButton.addEventListener('click', () => {
            hideMessageOverlay();
            nextLevel();
        });

        function startGame(difficulty) {
            if (!mazeSupported) {
                return;
            }

            gameState.difficulty = difficulty;
            gameState.level = 1;
            gameState.steps = 0;
            gameState.partnerFound = false;
            gameState.zoomLevel = 1;
            gameState.translateX = 0;
            gameState.translateY = 0;

            hideMessageOverlay();
            updateHud();
            setMissionText('找到终点处的伙伴后进入下一关。随着关卡提升，迷宫会持续扩大。');
            startTimer();
            levelSelect.style.display = 'none';
            refreshViewportMetrics();
            generateMaze();
        }

        function startTimer() {
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }

            gameState.startTime = Date.now();
            gameState.elapsedTime = 0;
            updateHud();

            gameState.timerInterval = setInterval(() => {
                gameState.elapsedTime = Math.floor((Date.now() - gameState.startTime) / 1000);
                updateHud();
            }, 1000);
        }

        function generateMaze() {
            const { width, height } = getCurrentConfig();
            const maze = Array(height).fill(null).map(() => Array(width).fill(1));

            function carvePassages(x, y) {
                const directions = [[0, -2], [2, 0], [0, 2], [-2, 0]];
                directions.sort(() => Math.random() - 0.5);

                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;

                    if (nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        maze[ny][nx] = 0;
                        carvePassages(nx, ny);
                    }
                }
            }

            const startX = 1;
            const startY = 1;
            maze[startY][startX] = 0;
            carvePassages(startX, startY);

            gameState.playerPosition = { x: startX, y: startY };
            gameState.visitedCells = new Set([keyOf(startX, startY)]);

            let endX = startX;
            let endY = startY;
            let maxDistance = 0;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (maze[y][x] === 0) {
                        const distance = Math.abs(x - startX) + Math.abs(y - startY);
                        if (distance > maxDistance) {
                            maxDistance = distance;
                            endX = x;
                            endY = y;
                        }
                    }
                }
            }

            gameState.partnerPosition = { x: endX, y: endY };
            gameState.maze = maze;
            updateHud();
            renderMaze();
        }

        function renderMaze() {
            mazeContainer.innerHTML = '';

            const { width, height, cellSize } = getCurrentConfig();
            const cellsContainer = document.createElement('div');
            cellsContainer.style.position = 'relative';
            cellsContainer.style.width = '100%';
            cellsContainer.style.height = '100%';
            mazeContainer.appendChild(cellsContainer);

            if (isMobileViewportMode()) {
                const radius = gameState.mobileViewportRadius;
                const windowSize = radius * 2 + 1;
                const startX = gameState.playerPosition.x - radius;
                const startY = gameState.playerPosition.y - radius;

                mazeContainer.style.width = `${windowSize * cellSize}px`;
                mazeContainer.style.height = `${windowSize * cellSize}px`;

                for (let renderY = 0; renderY < windowSize; renderY++) {
                    for (let renderX = 0; renderX < windowSize; renderX++) {
                        const mazeX = startX + renderX;
                        const mazeY = startY + renderY;
                        cellsContainer.appendChild(buildCell(cellSize, renderX, renderY, mazeX, mazeY));
                    }
                }

                const player = document.createElement('div');
                player.id = 'player';
                player.style.width = `${cellSize * 0.9}px`;
                player.style.height = `${cellSize * 0.9}px`;
                setActorPosition(player, radius, radius, cellSize);
                cellsContainer.appendChild(player);
                gameState.playerElement = player;

                const partner = document.createElement('div');
                partner.id = 'partner';
                partner.style.width = `${cellSize * 0.9}px`;
                partner.style.height = `${cellSize * 0.9}px`;

                const partnerRenderX = gameState.partnerPosition.x - startX;
                const partnerRenderY = gameState.partnerPosition.y - startY;
                const partnerVisible = (
                    partnerRenderX >= 0 &&
                    partnerRenderX < windowSize &&
                    partnerRenderY >= 0 &&
                    partnerRenderY < windowSize
                );

                if (partnerVisible) {
                    setActorPosition(partner, partnerRenderX, partnerRenderY, cellSize);
                    partner.style.display = gameState.partnerFound ? 'block' : 'none';
                    cellsContainer.appendChild(partner);
                    gameState.partnerElement = partner;
                } else {
                    gameState.partnerElement = null;
                }

                refreshViewportMetrics();
                scheduleFocusOnPlayer();
                return;
            }

            mazeContainer.style.width = `${width * cellSize}px`;
            mazeContainer.style.height = `${height * cellSize}px`;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    cellsContainer.appendChild(buildCell(cellSize, x, y, x, y));
                }
            }

            const player = document.createElement('div');
            player.id = 'player';
            player.style.width = `${cellSize * 0.9}px`;
            player.style.height = `${cellSize * 0.9}px`;
            setActorPosition(player, gameState.playerPosition.x, gameState.playerPosition.y, cellSize);
            cellsContainer.appendChild(player);
            gameState.playerElement = player;

            const partner = document.createElement('div');
            partner.id = 'partner';
            partner.style.width = `${cellSize * 0.9}px`;
            partner.style.height = `${cellSize * 0.9}px`;
            setActorPosition(partner, gameState.partnerPosition.x, gameState.partnerPosition.y, cellSize);
            cellsContainer.appendChild(partner);
            gameState.partnerElement = partner;

            refreshViewportMetrics();
            scheduleFocusOnPlayer();
        }

        function focusOnPlayer() {
            const { cellSize, width, height } = getCurrentConfig();
            const containerWidth = gameContainer.offsetWidth;
            const containerHeight = gameContainer.offsetHeight;
            const safeArea = gameState.safeArea;

            if (isMobileViewportMode()) {
                const viewportCells = gameState.mobileViewportRadius * 2 + 1;
                const viewportWidth = viewportCells * cellSize * gameState.zoomLevel;
                const viewportHeight = viewportCells * cellSize * gameState.zoomLevel;
                const availableWidth = Math.max(120, containerWidth - safeArea.left - safeArea.right);
                const availableHeight = Math.max(120, containerHeight - safeArea.top - safeArea.bottom);

                gameState.translateX = roundToDevicePixel(safeArea.left + (availableWidth - viewportWidth) / 2);
                gameState.translateY = roundToDevicePixel(safeArea.top + (availableHeight - viewportHeight) / 2);
                applyMazeTransform();
                return;
            }

            const availableWidth = Math.max(120, containerWidth - safeArea.left - safeArea.right);
            const availableHeight = Math.max(120, containerHeight - safeArea.top - safeArea.bottom);
            const scale = gameState.isMobile ? gameState.zoomLevel : 1;
            const scaledCellSize = cellSize * scale;
            const mazeWidth = width * scaledCellSize;
            const mazeHeight = height * scaledCellSize;
            const playerCenterX = gameState.playerPosition.x * scaledCellSize + scaledCellSize / 2;
            const playerCenterY = gameState.playerPosition.y * scaledCellSize + scaledCellSize / 2;
            const viewportCenterX = safeArea.left + availableWidth / 2;
            const viewportCenterY = safeArea.top + availableHeight / 2;
            const targetX = viewportCenterX - playerCenterX;
            const targetY = viewportCenterY - playerCenterY;

            if (mazeWidth <= availableWidth) {
                gameState.translateX = safeArea.left + (availableWidth - mazeWidth) / 2;
            } else {
                gameState.translateX = clamp(targetX, safeArea.left + availableWidth - mazeWidth, safeArea.left);
            }

            if (mazeHeight <= availableHeight) {
                gameState.translateY = safeArea.top + (availableHeight - mazeHeight) / 2;
            } else {
                gameState.translateY = clamp(targetY, safeArea.top + availableHeight - mazeHeight, safeArea.top);
            }

            gameState.translateX = roundToDevicePixel(gameState.translateX);
            gameState.translateY = roundToDevicePixel(gameState.translateY);
            applyMazeTransform();
        }

        function movePlayer(dx, dy) {
            if (!mazeSupported) {
                return;
            }

            const current = getCurrentConfig();
            const newX = gameState.playerPosition.x + dx;
            const newY = gameState.playerPosition.y + dy;

            if (
                newX >= 0 &&
                newX < current.width &&
                newY >= 0 &&
                newY < current.height &&
                gameState.maze[newY][newX] === 0
            ) {
                const previousX = gameState.playerPosition.x;
                const previousY = gameState.playerPosition.y;
                gameState.playerPosition = { x: newX, y: newY };
                gameState.steps++;
                gameState.visitedCells.add(keyOf(previousX, previousY));
                gameState.visitedCells.add(keyOf(newX, newY));
                updateHud();

                const foundPartnerNow = (
                    newX === gameState.partnerPosition.x &&
                    newY === gameState.partnerPosition.y &&
                    !gameState.partnerFound
                );

                if (foundPartnerNow) {
                    gameState.partnerFound = true;
                }

                if (isMobileViewportMode()) {
                    renderMaze();
                } else {
                    const previousCell = document.querySelector(`.cell[data-x="${previousX}"][data-y="${previousY}"]`);
                    if (previousCell && !previousCell.classList.contains('end')) {
                        previousCell.classList.add('visited');
                    }

                    setActorPosition(gameState.playerElement, newX, newY, current.cellSize);
                    scheduleFocusOnPlayer();
                }

                if (foundPartnerNow) {
                    if (gameState.partnerElement) {
                        gameState.partnerElement.style.display = 'block';
                    }
                    clearInterval(gameState.timerInterval);
                    setMissionText('伙伴已经找到，准备进入更复杂的下一关。');
                    showMessageOverlay(
                        '找到伙伴了',
                        `你在第 ${gameState.level} 关用时 ${gameState.elapsedTime} 秒、共走了 ${gameState.steps} 步。下一关迷宫会继续扩大。`,
                        `进入第 ${gameState.level + 1} 关`
                    );
                }
            }
        }

        function nextLevel() {
            if (!mazeSupported) {
                return;
            }

            gameState.level++;
            gameState.steps = 0;
            gameState.partnerFound = false;
            gameState.zoomLevel = 1;
            gameState.translateX = 0;
            gameState.translateY = 0;
            updateHud();
            setMissionText('难度已经提升。留意更长的岔路与更紧凑的视野。');
            startTimer();
            generateMaze();
        }

        document.addEventListener('keydown', (event) => {
            if (!mazeSupported) {
                return;
            }

            if (levelSelect.style.display !== 'none' || !messageOverlay.classList.contains('hidden')) {
                return;
            }

            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePlayer(1, 0);
                    break;
                case '+':
                    if (gameState.isMobile) {
                        zoomIn();
                    }
                    break;
                case '-':
                    if (gameState.isMobile) {
                        zoomOut();
                    }
                    break;
                default:
                    break;
            }
        });

        let initialDistance = 0;

        gameContainer.addEventListener('touchstart', (event) => {
            if (event.touches.length === 2) {
                initialDistance = Math.hypot(
                    event.touches[0].clientX - event.touches[1].clientX,
                    event.touches[0].clientY - event.touches[1].clientY
                );
            }
        }, { passive: true });

        gameContainer.addEventListener('touchmove', (event) => {
            if (event.touches.length === 2) {
                const currentDistance = Math.hypot(
                    event.touches[0].clientX - event.touches[1].clientX,
                    event.touches[0].clientY - event.touches[1].clientY
                );

                if (initialDistance > 0) {
                    const delta = currentDistance - initialDistance;

                    if (Math.abs(delta) > 10) {
                        if (delta > 0) {
                            zoomIn();
                        } else {
                            zoomOut();
                        }
                        initialDistance = currentDistance;
                    }
                }

                event.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            if (levelSelect.style.display === 'none') {
                refreshViewportMetrics();
                scheduleFocusOnPlayer();
            }
        });

        updateHud();
    </script>
    <script src="../js/game-back.js"></script>
</body>
</html>
